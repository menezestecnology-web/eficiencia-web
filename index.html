<title>Sistema de Eficiência Individual · MenezesTecnologia</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230d2342'/%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23163760'/%3E%3Cstop offset='1' stop-color='%230d2342'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='8' y='30' font-family='Segoe UI,Arial,sans-serif' font-size='22' font-weight='800' fill='white' letter-spacing='1'%3EEI%3C/text%3E%3Ctext x='8' y='52' font-family='Segoe UI,Arial,sans-serif' font-size='20' font-weight='900' fill='%232563eb'%3E%%3C/text%3E%3Ccircle cx='52' cy='14' r='6' fill='%232563eb' opacity='.7'/%3E%3C/svg%3E">
<style>
:root{
  /* ── Harmonized palette (indigo + teal accents) ── */
  --navy:#0b2545; /* deep indigo */
  --navy2:#163c69; /* indigo-700 */
  --navy3:#235fa8; /* indigo-600 */
  --navy4:#2b7be0; /* indigo-500 */
  --blue:#2563eb; --blue-d:#1d4ed8; --blue-l:#eef6ff; --blue-ll:#dbeafe;
  --teal:#0ea5a4; --teal-d:#0b9b99; --teal-l:#ecfdfd; --teal-ll:#cff6f6;
  --green:#059669; --green-d:#047857; --green-l:#ecfdf5; --green-ll:#d1fae5;
  --red:#dc2626; --red-d:#b91c1c; --red-l:#fff1f1; --red-ll:#fee2e2;
  --amber:#d97706; --amber-d:#b45309; --amber-l:#fffbeb; --amber-ll:#fef3c7;
  --violet:#7c3aed; --violet-l:#f5f3ff;
  /* ── Ink ── */
  --ink:#0b1220; --ink2:#334155; --ink3:#4b617a; --ink4:#7b8fa6;
  /* ── Surfaces ── */
  --line:#e6eef8; --line2:#f4f7fb; --bg:#f6f9fb; --surface:#ffffff; --subtle:#f9fcfe;
  /* ── Shadows ── */
  --shadow:0 4px 10px rgba(11,37,70,.06),0 1px 3px rgba(11,37,70,.04);
  --shadow-md:0 8px 26px rgba(11,37,70,.10),0 4px 10px rgba(11,37,70,.06);
  --shadow-lg:0 28px 64px rgba(11,37,70,.20),0 10px 28px rgba(11,37,70,.12);
  --shadow-card:0 6px 20px rgba(11,37,70,.08),0 2px 6px rgba(11,37,70,.04);
  /* ── Radius & Font ── */
  --r:14px; --r-sm:10px; --r-xs:7px;
  --font:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:13px;color:var(--ink)}
table{border-collapse:collapse;width:100%}
h1,h2,h3,h4{font-weight:700;line-height:1.25}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--line2)}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}

/* ───── SIDEBAR ───── */
.layout{display:flex;align-items:stretch;min-height:100vh}
.sidebar{
  width:222px;flex-shrink:0;
  background:linear-gradient(180deg,var(--navy) 0%,var(--navy2) 55%,var(--navy3) 100%);
  color:#fff;display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
  box-shadow:4px 0 24px rgba(13,35,66,.28);z-index:20;
}
.content{flex:1;min-width:0;display:flex;flex-direction:column}
.side-brand{
  display:flex;align-items:center;gap:11px;
  padding:18px 16px 16px;border-bottom:1px solid rgba(255,255,255,.12);
  cursor:pointer;flex-shrink:0;transition:.15s;background:rgba(0,0,0,.14);
}
.side-brand:hover{background:rgba(255,255,255,.07)}
.side-brand .brand-logo{
  width:62px;height:62px;border-radius:12px;
  background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.07));
  display:flex;align-items:center;justify-content:center;font-size:22px;
  border:1px solid rgba(255,255,255,.22);overflow:hidden;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.22);
}
.side-brand .brand-logo img{width:100%;height:100%;object-fit:contain;padding:2px}
.side-brand h1{font-size:12px;letter-spacing:.2px;font-weight:700;line-height:1.3}
.side-brand p{font-size:7.5px;color:rgba(255,255,255,.52);font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-top:3px;line-height:1.4}
.side-sec-label{padding:14px 14px 4px;font-size:8px;font-weight:800;color:rgba(255,255,255,.32);text-transform:uppercase;letter-spacing:.14em}
.side-nav{padding:8px 10px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto}
.side-nav button{
  display:flex;align-items:center;gap:11px;padding:10px 13px;
  border-radius:9px;color:rgba(255,255,255,.65);font-weight:600;font-size:12.5px;
  text-align:left;width:100%;transition:.14s;
}
.side-nav button:hover{background:rgba(255,255,255,.10);color:rgba(255,255,255,.92)}
.side-nav button.on{
  background:rgba(255,255,255,.14);color:#fff;
  box-shadow:inset 3px 0 0 var(--amber),0 2px 8px rgba(0,0,0,.14);
}
.side-nav button .ic{font-size:15px;width:21px;text-align:center;flex-shrink:0}
.side-foot{
  padding:13px 16px;font-size:8.5px;color:rgba(255,255,255,.38);
  border-top:1px solid rgba(255,255,255,.10);font-weight:700;
  letter-spacing:.4px;text-transform:uppercase;background:rgba(0,0,0,.14);
}
@media(max-width:760px){
  .layout{flex-direction:column}
  .sidebar{width:100%;height:auto;position:static;flex-direction:row;flex-wrap:wrap;align-items:center}
  .side-brand{border-bottom:none}
  .side-sec-label{display:none}
  .side-nav{flex-direction:row;flex-wrap:wrap;flex:1;padding:8px}
  .side-nav button{width:auto}
  .side-foot{display:none}
}

/* ───── LAYOUT ───── */
.wrap{max-width:1080px;margin:0 auto;padding:16px 20px;overflow-x:hidden}
/* tela de lançamentos usa quase toda a largura disponível (menos "borda" lateral) */
.wrap.wrap-wide{max-width:1480px;padding:16px 28px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-card);min-width:0}
.card-pad{padding:16px}
.sec-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.sec-title{display:flex;align-items:center;gap:10px}
.sec-title .ico{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--blue-l),var(--blue-ll));
  color:var(--blue-d);display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;box-shadow:0 2px 7px rgba(37,99,235,.14);
}
.sec-title h2{font-size:14px;color:var(--navy);letter-spacing:.2px;font-weight:800}
.sec-title p{font-size:10.5px;color:var(--ink4);font-weight:600;margin-top:2px}

/* ───── BUTTONS ───── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  gap:7px;font-weight:700;font-size:12.5px;border-radius:var(--r-sm);
  padding:9px 16px;transition:.14s;white-space:nowrap;border:1px solid transparent;letter-spacing:.1px;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.42;cursor:not-allowed;transform:none!important}
.btn .ic{font-size:14px}
.btn-sm{padding:6px 12px;font-size:11.5px}
.btn-primary{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;box-shadow:0 2px 10px rgba(13,35,66,.30)}
.btn-primary:hover:not(:disabled){background:linear-gradient(135deg,var(--navy2),var(--navy3))}
.btn-blue{background:linear-gradient(135deg,var(--blue),var(--blue-d));color:#fff;box-shadow:0 2px 10px rgba(37,99,235,.28)}
.btn-blue:hover:not(:disabled){filter:brightness(1.07)}
.btn-green{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;box-shadow:0 2px 10px rgba(5,150,105,.28)}
.btn-green:hover:not(:disabled){filter:brightness(1.07)}
.btn-red{background:linear-gradient(135deg,var(--red),var(--red-d));color:#fff;box-shadow:0 2px 10px rgba(220,38,38,.28)}
.btn-red:hover:not(:disabled){filter:brightness(1.07)}
.btn-amber{background:linear-gradient(135deg,var(--amber),var(--amber-d));color:#fff;box-shadow:0 2px 10px rgba(217,119,6,.28)}
.btn-ghost{background:var(--surface);color:var(--ink2);border:1.5px solid var(--line);box-shadow:var(--shadow)}
.btn-ghost:hover:not(:disabled){background:var(--subtle);border-color:#c4cdd8;color:var(--navy)}
.btn-soft{background:var(--blue-l);color:var(--blue-d);border-color:var(--blue-ll)}
.btn-soft:hover:not(:disabled){background:var(--blue-ll)}
.icon-btn{width:28px;height:28px;border-radius:var(--r-xs);display:inline-flex;align-items:center;justify-content:center;font-size:13px;transition:.13s;flex-shrink:0}
.icon-btn.del{background:var(--red-l);color:var(--red-d);border:1px solid #fecaca}
.icon-btn.del:hover{background:var(--red-ll);color:var(--red)}
.icon-btn.edit{background:var(--blue-l);color:var(--blue-d);border:1px solid var(--blue-ll)}
.icon-btn.edit:hover{background:var(--blue-ll)}

/* ───── FORM ───── */
.field label{display:block;font-size:10px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px}
.inp{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:9px 11px;background:var(--subtle);transition:.12s;outline:none}
.inp:focus{border-color:var(--navy);background:#fff;box-shadow:0 0 0 3px rgba(15,39,68,.10)}
select.inp{cursor:pointer}
.hint{font-size:10.5px;color:var(--ink3);margin-top:4px}

/* ───── METRIC CARDS ───── */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0}
.metric{padding:5px 20px;border-left:1px solid var(--line2)}
.metric:first-child{border-left:none}
.metric .lbl{font-size:9.5px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.07em}
.metric .val{font-size:26px;font-weight:800;line-height:1.15;margin-top:3px;font-variant-numeric:tabular-nums}
.metric .val small{font-size:12px;font-weight:700;color:var(--ink4)}
.metric.blue .val{color:var(--blue-d)}
.metric.red .val{color:var(--red-d)}
.metric.green .val{color:var(--green-d)}
.metric.navy .val{color:var(--navy)}

/* ───── TABS ───── */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--line);margin-bottom:16px;background:var(--subtle);border-radius:8px 8px 0 0;padding:4px 4px 0}
.tabs button{padding:9px 18px;font-size:12px;font-weight:700;color:var(--ink3);border-bottom:3px solid transparent;margin-bottom:-2px;transition:.13s;display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.05em;border-radius:7px 7px 0 0}
.tabs button:hover{color:var(--ink2);background:rgba(255,255,255,.7)}
.tabs button.on{color:var(--navy);border-bottom-color:var(--navy);background:#fff;box-shadow:0 -1px 0 var(--line),1px 0 0 var(--line),-1px 0 0 var(--line)}

/* ───── DATA TABLE ───── */
.tbl-wrap{border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden}
.tbl-scroll{overflow:auto;-webkit-overflow-scrolling:touch}
table.dt{font-size:12px}
table.dt thead th{
  background:linear-gradient(135deg,var(--navy),var(--navy2));
  color:#fff;font-size:9.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;padding:10px 11px;text-align:left;
  white-space:nowrap;position:sticky;top:0;z-index:1;
}
table.dt thead th:first-child{padding-left:14px}
table.dt tbody td{padding:9px 11px;border-bottom:1px solid var(--line2);white-space:nowrap;vertical-align:middle}
table.dt tbody td:first-child{padding-left:14px}
table.dt tbody tr:last-child td{border-bottom:none}
table.dt tbody tr:nth-child(even){background:#f9fbfd}
table.dt tbody tr:hover{background:var(--blue-l)}
table.dt .num{text-align:right;font-variant-numeric:tabular-nums}
table.dt .ctr{text-align:center}
table.dt tfoot td{
  padding:9px 11px;
  background:linear-gradient(135deg,#eef2f8,#e8edf5);
  font-weight:800;color:var(--navy);border-top:2px solid var(--line);
}
table.dt tfoot td:first-child{padding-left:14px}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.03em}
.tag-blue{background:var(--blue-l);color:var(--blue-d);border:1px solid var(--blue-ll)}
.tag-slate{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
.tag-green{background:var(--green-l);color:var(--green-d);border:1px solid var(--green-ll)}
.tag-red{background:var(--red-l);color:var(--red-d);border:1px solid #fee2e2}
.empty{padding:36px;text-align:center;color:var(--ink4);font-size:12.5px}
.empty .big{font-size:32px;margin-bottom:8px;opacity:.45}

/* ───── SUMMARY PANELS ───── */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-card);overflow:hidden;min-width:0;transition:box-shadow .2s}
.panel:hover{box-shadow:0 12px 26px rgba(11,37,70,.1)}
.panel-h{
  padding:11px 16px;border-bottom:1px solid var(--line);
  font-size:10.5px;font-weight:800;color:var(--navy);text-transform:uppercase;
  letter-spacing:.08em;background:linear-gradient(135deg,var(--subtle),#edf1f8);
  display:flex;align-items:center;gap:8px;
}
.panel-h::before{content:"";display:block;width:3px;height:14px;border-radius:3px;background:var(--navy);flex-shrink:0}
.panel-b{padding:15px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.stat .k{font-size:10px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.05em}
.stat .v{font-size:22px;font-weight:800;margin-top:1px;font-variant-numeric:tabular-nums}
.stat .v.blue{color:var(--blue-d)} .stat .v.green{color:var(--green-d)} .stat .v.red{color:var(--red-d)} .stat .v.navy{color:var(--navy)}
.formula{font-size:10px;color:var(--ink4);margin-top:3px;font-style:italic}

/* ───── INFO / NOTE ───── */
.note{
  display:flex;gap:9px;align-items:center;font-size:11px;color:var(--ink2);
  background:var(--blue-l);border:1px solid var(--blue-ll);
  border-radius:var(--r-sm);padding:9px 13px;margin-top:10px;
}
.note .ic{color:var(--blue-d);flex-shrink:0}
.banner{padding:13px 16px;border-radius:10px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:10px}
.banner-warn{background:var(--amber-l);border:1px solid #fde68a;color:var(--amber-d)}

/* ───── FOOTER BAR ───── */
.actionbar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  margin-top:18px;padding:14px 18px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
}
.appfoot{text-align:center;padding:20px;color:var(--ink4);font-size:11px}
.appfoot b{color:var(--navy2)}

/* ───── MODAL ───── */
.modal-bg{
  position:fixed;inset:0;z-index:50;background:rgba(6,14,28,.62);
  backdrop-filter:blur(6px);display:flex;align-items:flex-start;
  justify-content:center;padding:40px 16px;overflow:auto;
}
.modal{background:#fff;border-radius:16px;width:100%;max-width:520px;box-shadow:var(--shadow-lg);overflow:hidden;animation:pop .18s ease}
.modal.wide{max-width:760px}
@keyframes pop{from{opacity:0;transform:translateY(-14px) scale(.97)}to{opacity:1;transform:none}}
.modal-h{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--line);
  background:linear-gradient(135deg,var(--subtle),#edf1f8);
}
.modal-h h3{font-size:15.5px;color:var(--navy);font-weight:800}
.modal-h p{font-size:11px;color:var(--ink4);margin-top:2px;font-weight:600}
.modal-x{
  width:30px;height:30px;border-radius:8px;background:#fff;
  border:1.5px solid var(--line);color:var(--ink4);font-size:18px;
  display:flex;align-items:center;justify-content:center;transition:.13s;
}
.modal-x:hover{background:var(--red-l);color:var(--red-d);border-color:#fecaca}
.modal-b{padding:22px;display:flex;flex-direction:column;gap:15px;max-height:66vh;overflow:auto}
.modal-f{
  display:flex;justify-content:flex-end;gap:9px;padding:14px 22px;
  border-top:1px solid var(--line);background:linear-gradient(135deg,var(--subtle),#edf1f8);
}
/* Enhancements for mapping modal visuals */
.modal .field label{font-size:12px;color:var(--ink3);font-weight:700;margin-bottom:6px;display:block}
.modal .inp{padding:10px;border:1px solid var(--line);border-radius:10px;background:var(--surface)}
.modal select.inp{appearance:none;padding-right:22px}
.modal table{border-radius:8px;overflow:hidden;border:1px solid var(--line);background:var(--subtle)}
.modal table th{background:linear-gradient(90deg,var(--blue-l),var(--teal-ll));color:var(--navy);font-weight:700;padding:8px}
.modal table td{padding:8px;border-top:1px solid rgba(0,0,0,0.03);font-size:13px}
.modal-h{box-shadow:inset 0 -1px 0 rgba(255,255,255,.6)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.calc-box{
  background:linear-gradient(135deg,var(--navy),var(--navy2));
  color:#fff;border-radius:12px;padding:14px 18px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 4px 14px rgba(13,35,66,.25);
}
.calc-box .k{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.6);font-weight:700}
.calc-box .v{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}

/* ───── TOAST ───── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{
  background:var(--navy);color:#fff;padding:11px 20px;border-radius:10px;
  font-size:12.5px;font-weight:600;box-shadow:var(--shadow-lg);animation:tin .22s ease;
  display:flex;gap:9px;align-items:center;border:1px solid rgba(255,255,255,.12);
}
.toast.ok{background:linear-gradient(135deg,var(--green-d),var(--green))}
.toast.err{background:linear-gradient(135deg,var(--red-d),var(--red))}
@keyframes tin{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ───── DASHBOARD KPI CARDS ───── */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(172px,1fr));gap:14px}
.kpi{
  --acc:var(--navy3);
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow-card);padding:17px 18px 15px;
  position:relative;overflow:hidden;transition:transform .2s cubic-bezier(.2,.7,.3,1),box-shadow .2s;
}
.kpi:hover{box-shadow:0 14px 28px rgba(11,37,70,.14);transform:translateY(-3px)}
.kpi::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
  background:var(--acc);border-radius:var(--r) 0 0 var(--r);
}
/* brilho de acento no canto — dá identidade de cor a cada indicador */
.kpi::after{content:"";position:absolute;right:-28px;top:-28px;width:96px;height:96px;border-radius:50%;
  background:radial-gradient(circle,var(--acc),transparent 70%);opacity:.1;pointer-events:none;transition:opacity .2s}
.kpi:hover::after{opacity:.18}
.kpi.b{--acc:var(--blue)}
.kpi.g{--acc:var(--green-d)}
.kpi.r{--acc:var(--red-d)}
.kpi.a{--acc:var(--amber)}
.kpi .k{font-size:9.5px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.07em;padding-left:8px;position:relative}

/* Versão web: dados no Supabase via window.db (definido em js/supabase-bridge.js).

var LSKEY="sisEficInd_v4";
var DB=null;
var _hasBridge=!!(window.db&&window.db.load&&window.db.save);
var _lsOk=(function(){try{localStorage.setItem("__test","1");localStorage.removeItem("__test");return true;}catch(e){return false;}})();

/* Carrega o objeto DB. Assíncrono porque a chamada ao Supabase é remota. */
function loadDBAsync(){
  if(_hasBridge){
    return window.db.load().then(function(res){
      if(res&&res.ok)return res.data;
      if(res&&res.error)console.error("Falha ao carregar dados:",res.error);
      return null;
    }).catch(function(e){console.error("Erro no bridge de dados:",e);return null;});
  }
  try{var r=localStorage.getItem(LSKEY);return Promise.resolve(r?JSON.parse(r):null);}
  catch(e){return Promise.resolve(null);}
}

function saveDB(){
  if(!DB)return;
  if(_hasBridge){
    window.db.save(DB).then(function(res){
      if(res&&!res.ok)console.error("Falha ao salvar dados:",res.error);
    }).catch(function(e){console.error("Erro ao salvar:",e);});
    return;
  }
  if(!_lsOk)return;
  try{localStorage.setItem(LSKEY,JSON.stringify(DB));}catch(e){}
}

/* ─────────── CÁLCULOS DO DIA ─────────── */
function calcLanc(l){
  var qtd=l.tipo==="lotes"?(Number(l.lotes)||0)*(Number(l.pecasPorLote)||0):(Number(l.quantidade)||0);
  var pontos=qtd*(Number(l.tempoPadrao)||0);
  return{quantidade:qtd,pontos:pontos};
}
function calcDia(dia){
  var totPecas=0,totPontos=0;
  (dia.lancamentos||[]).forEach(function(l){var c=calcLanc(l);totPecas+=c.quantidade;totPontos+=c.pontos;});
  var minOcor=(dia.ocorrencias||[]).reduce(function(s,o){return s+(Number(o.minutos)||0);},0);
  var jornada=Number(dia.jornada)||0;
  var disp=Math.max(0,jornada-minOcor);
  var efic=disp>0?(totPontos/disp)*100:0;
  return{totPecas:totPecas,totPontos:totPontos,minOcor:minOcor,jornada:jornada,disp:disp,efic:efic,
    nLanc:(dia.lancamentos||[]).length,nOcor:(dia.ocorrencias||[]).length};
}
/* faixaDe/corEfic aceitam um "src" opcional (um dia/registro que carrega a
   meta e as faixas congeladas da época). Quando informado, a classificação usa
   o retrato do registro; senão, usa a configuração atual (médias/agregados). */
function faixaDe(efic,src){
  var fx=(src&&src.faixas&&src.faixas.length)?src.faixas:DB.config.faixas;
  for(var i=0;i<fx.length;i++){if(efic>=fx[i].de&&efic<=fx[i].ate)return fx[i];}
  return{rotulo:"—",cor:"#94a3b8"};
}
function corEfic(efic,src){
  var meta=(src&&src.metaEficiencia!=null)?src.metaEficiencia:DB.config.metaEficiencia;
  return efic>=meta?"#2563eb":"#b91c1c";
}
/* Retrato da meta e faixas vigentes — congela a classificação do registro no
   momento em que ele é criado, para o histórico não mudar de cor caso a empresa
   adote nova meta/faixas depois. */
function snapCfg(){
  return{metaEficiencia:DB.config.metaEficiencia,faixas:JSON.parse(JSON.stringify(DB.config.faixas||[]))};
}
/* ── Meta unificada com as Faixas ──
   O limite azul/vermelha é o início da faixa "Dentro da meta". Estes helpers
   mantêm o campo "Meta de eficiência (%)" e a faixa-alvo sempre sincronizados. */
function bandaMeta(fx){
  fx=fx||DB.config.faixas||[];
  return fx.find(function(f){return /dentro|na meta|atingi/i.test(f.rotulo||"");})
      || fx.find(function(f){return (f.cor||"").toLowerCase()==="#2563eb";})
      || fx.slice().sort(function(a,b){return a.de-b.de;})[Math.min(2,Math.max(0,fx.length-1))];
}
function metaDasFaixas(){
  var b=bandaMeta(DB.config.faixas);
  return b?Number(b.de):DB.config.metaEficiencia;
}
/* Alinha a faixa-alvo (e fecha o "buraco" da faixa imediatamente abaixo) ao valor da meta. */
function alinharFaixasComMeta(meta){
  var fx=DB.config.faixas||[]; if(!fx.length)return;
  var alvo=bandaMeta(fx); if(!alvo)return;
  alvo.de=meta;
  var abaixo=null;
  fx.forEach(function(f){if(f!==alvo&&f.de<meta&&(!abaixo||f.de>abaixo.de))abaixo=f;});
  if(abaixo)abaixo.ate=Math.max(abaixo.de,Math.round((meta-0.01)*100)/100);
}
/* Replica a meta/faixas atuais nos dias em rascunho (finalizados ficam congelados). */
function syncRascunhos(){
  DB.dias.forEach(function(d){
    if(d.status!=="finalizado"){d.metaEficiencia=DB.config.metaEficiencia;d.faixas=snapCfg().faixas;}
  });
}
/* Ao FINALIZAR o dia: congela a meta/faixas vigentes NO MOMENTO da finalização
   (data/hora em que a eficiência é definida) — é essa config que decide a cor. */
function congelarFinalizacao(dia){
  var s=snapCfg();
  dia.status="finalizado";
  dia.metaEficiencia=s.metaEficiencia;
  dia.faixas=s.faixas;
  dia.finalizadoEm=new Date().toISOString();
}
/* Registra no histórico cada alteração da faixa/meta (data/hora + valores).
   Permite auditar quando a configuração mudou. */
function registrarHistoricoFaixa(){
  if(!DB.config.faixasHistorico)DB.config.faixasHistorico=[];
  var h=DB.config.faixasHistorico;
  var atual=JSON.stringify(DB.config.faixas||[]);
  var ult=h.length?h[h.length-1]:null;
  /* só grava se mudou de fato (meta ou faixas) */
  if(ult && ult.meta===DB.config.metaEficiencia && JSON.stringify(ult.faixas||[])===atual) return;
  h.push({em:new Date().toISOString(),meta:DB.config.metaEficiencia,faixas:JSON.parse(atual)});
  if(h.length>100)h.splice(0,h.length-100);
}

/* calcula di/df conforme modo */
function calcPeriodo(modo,di,df){
  var hoje=new Date(); hoje.setHours(0,0,0,0);
  function iso(d){return d.toISOString().slice(0,10);}
  if(modo==="semanaAtual"){
    var dow=hoje.getDay(); var seg=new Date(hoje); seg.setDate(hoje.getDate()-(dow===0?6:dow-1));
    var dom=new Date(seg); dom.setDate(seg.getDate()+6);
    return{di:iso(seg),df:iso(dom)};
  }
  if(modo==="semanaAnterior"){
    var dow2=hoje.getDay(); var seg2=new Date(hoje); seg2.setDate(hoje.getDate()-(dow2===0?6:dow2-1)-7);
    var dom2=new Date(seg2); dom2.setDate(seg2.getDate()+6);
    return{di:iso(seg2),df:iso(dom2)};
  }
  if(modo==="mesAtual"){
    var m=new Date(hoje.getFullYear(),hoje.getMonth(),1);
    var mf=new Date(hoje.getFullYear(),hoje.getMonth()+1,0);
    return{di:iso(m),df:iso(mf)};
  }
  if(modo==="mesAnterior"){
    var ma=new Date(hoje.getFullYear(),hoje.getMonth()-1,1);
    var maf=new Date(hoje.getFullYear(),hoje.getMonth(),0);
    return{di:iso(ma),df:iso(maf)};
  }
  return{di:di,df:df};
}

/* ── Gera e abre o PDF do relatório escolhido ── */
function gerarRelatorio(){
  var tipo=UI.relTipo;
  var modoRel=UI.relModo;
  if(!tipo||!modoRel){toast("Selecione o tipo de relatório e o período","err");return;}
  var per=calcPeriodo(modoRel,UI.relDi,UI.relDf);
  var di=per.di, df=per.df;

  /* relatórios oficiais consideram apenas dias finalizados (igual ao Dashboard) */
  var dias=DB.dias.filter(function(d){return d.status==="finalizado"&&d.data>=di&&d.data<=df;});
  /* dias com lançamentos ainda em rascunho no período — avisados (não entram nos números) */

  var rascunhos=DB.dias.filter(function(d){return d.status==="rascunho";}).length;
  var dataExt=new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
  dataExt=dataExt.charAt(0).toUpperCase()+dataExt.slice(1); /* inicial maiúscula p/ visual */
  var horaAgora=new Date().getHours();
  var saudacao=horaAgora<12?"Bom dia":(horaAgora<18?"Boa tarde":"Boa noite");
  var mods=[
    {s:"lancamentos",ic:"📋",cor:"#2563eb",bg:"#eff4ff",t:"Lançamentos de Produção",
      d:"Registrar a produção e as ocorrências do dia, com resumos automáticos.",
      stat:DB.dias.length+" dia(s) · "+rascunhos+" em edição"},
    {s:"eficiencia",ic:"📈",cor:"#047857",bg:"#ecfdf5",t:"Dashboard de Eficiência",
      d:"Ranking individual, evolução diária, faixas e histórico de desempenho.",
      stat:fin.length+" dia(s) finalizado(s)"},
    {s:"operadores",ic:"👥",cor:"#1a3c6e",bg:"#eef2f7",t:"Operadores",
      d:"Cadastro das operadoras e vínculo com as equipes de produção.",
      stat:DB.operadores.length+" operador(es)"},
    {s:"operacoes",ic:"⚙️",cor:"#b45309",bg:"#fffbeb",t:"Operações e Tempos",
      d:"Modelos, operações e tempos padrão — base dos roteiros EasyTime.",
      stat:DB.operacoes.length+" operação(ões)"},
    {s:"equipes",ic:"🏭",cor:"#7c3aed",bg:"#f5f3ff",t:"Equipes",
      d:"Cadastro e organização das equipes de produção.",
      stat:DB.equipes.length+" equipe(s)"},
    {s:"config",ic:"🔧",cor:"#475569",bg:"#f1f5f9",t:"Configurações",
      d:"Empresa, jornada, início da faixa de meta, faixas e backup dos dados.",
      stat:"Ajustes gerais do sistema"}
  ];
  var cards=mods.map(function(m){
    return '<button class="menu-card" data-act="nav" data-screen="'+m.s+'" style="--mc:'+m.cor+'">'+
      '<div class="mc-ico" style="background:'+m.bg+';color:'+m.cor+'">'+m.ic+'</div>'+
      '<div class="mc-title">'+esc(m.t)+'</div>'+
      '<div class="mc-desc">'+esc(m.d)+'</div>'+
      '<div class="mc-stat">▸ '+esc(m.stat)+'</div>'+
      '<div class="mc-go">→</div>'+
    '</button>';
  }).join("");
  return '<div class="hero">'+
    '<div><div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:7px">'+saudacao+' 👋</div>'+
      '<h2>Sistema de Eficiência Individual</h2>'+
      '<p>'+esc(DB.empresa.nome)+' · '+esc(dataExt)+'</p></div>'+
    '<div class="hstat">'+
      '<div><div class="v">'+DB.dias.length+'</div><div class="k">Dias</div></div>'+
      '<div><div class="v">'+fin.length+'</div><div class="k">Finalizados</div></div>'+
      '<div><div class="v">'+(DB.dias.length-fin.length)+'</div><div class="k">Em edição</div></div>'+
    '</div>'+
  '</div>'+
  (!DB.config.roteirosImportados
    ?'<div class="card" style="border-color:#fde68a;background:#fffbeb;padding:16px 20px;margin-bottom:18px">'+
      '<div style="display:flex;gap:13px;align-items:flex-start;flex-wrap:wrap">'+
      '<div style="font-size:24px">📥</div>'+
      '<div style="flex:1;min-width:240px">'+
      '<div style="font-weight:800;color:#b45309;font-size:13.5px;margin-bottom:2px">Configuração inicial — carregue seus dados reais</div>'+
      '<div style="font-size:12px;color:var(--ink2)">O sistema está com dados de exemplo. Importe seus roteiros (operações e tempos) e seus operadores. É uma vez só — depois fica salvo no computador.</div>'+
      '<div style="display:flex;gap:8px;margin-top:11px;flex-wrap:wrap">'+
      '<button class="btn btn-amber btn-sm" data-act="importRoteiros"><span class="ic">📥</span>Importar Roteiros (EasyTime)</button>'+
      '<button class="btn btn-amber btn-sm" data-act="importRoteirosSimplificado"><span class="ic">📥</span>Importar Roteiros Simplificado</button>'+
      '<button class="btn btn-ghost btn-sm" data-act="importOper"><span class="ic">📥</span>Importar Operadores / Equipes</button>'+
      '</div></div></div></div>'
    :'')+
  '<div class="menu-tit">Módulos do sistema — selecione para acessar</div>'+

}

function lancRow(l){
  var cc=calcLanc(l);
  var ref='<button class="reflink" data-act="editLanc" data-id="'+l.id+'" title="Editar este lançamento"><span class="tag tag-blue">'+esc(l.modeloRef)+'</span></button>';
  var ellip='overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0';
  return '<tr>'+
    '<td>'+esc(l.hora)+'</td>'+
    '<td style="'+ellip+'">'+ref+'</td>'+
    '<td style="'+ellip+'">'+esc(l.modeloNome)+'</td>'+
    '<td class="ctr">'+esc(l.operacaoId)+'</td>'+
    '<td style="'+ellip+'">'+esc(l.operacaoNome)+'</td>'+
    '<td class="ctr"><span class="tag '+(l.tipo==="lotes"?"tag-blue":"tag-slate")+'" style="padding:1px 5px;font-size:9px">'+(l.tipo==="lotes"?"Lotes":"Qtd")+'</span></td>'+
    '<td class="num">'+(l.tipo==="lotes"?ni(l.lotes):"—")+'</td>'+
    '<td class="num">'+(l.tipo==="lotes"?ni(l.pecasPorLote):"—")+'</td>'+
    '<td class="num"><b>'+ni(cc.quantidade)+'</b></td>'+
    '<td class="num">'+nf(l.tempoPadrao,3)+'</td>'+
    '<td class="num" style="color:var(--blue-d);font-weight:800">'+nf(cc.pontos)+'</td>'+
    '<td class="ctr">'+
      '<div style="display:flex;gap:4px;justify-content:center">'+
      '<button class="icon-btn edit" data-act="editLanc" data-id="'+l.id+'" title="Editar">✎</button>'+
      '<button class="icon-btn del" data-act="delLanc" data-id="'+l.id+'" title="Excluir">🗑</button></div>'+
    '</td>'+
  '</tr>';
}
function filtrarLancamentos(dia){
  var arr=(dia.lancamentos||[]).slice();
  if(UI.modeloAtivo)arr=arr.filter(function(l){return l.modeloRef===UI.modeloAtivo;});
  return arr;
}
function lancRowsHTML(dia){
  var arr=filtrarLancamentos(dia);
  if(!arr.length)return '<tr><td colspan="12"><div class="empty"><div class="big">📋</div>'+
    (UI.modeloAtivo?"Nenhum lançamento desta referência. Clique em Novo Lançamento.":"Nenhum lançamento registrado neste dia.")+'</div></td></tr>';
  return arr.map(function(l){return lancRow(l);}).join("");
}

  var contador=UI.modeloAtivo
    ?'Exibindo <span style="color:var(--navy);font-size:13px">'+nFiltrado+'</span> de '+c.nLanc

function dadosEficiencia(){
  var fin=DB.dias.filter(function(d){return d.status==="finalizado";});
  if(UI.filtroEquipe!=="todas")fin=fin.filter(function(d){return d.equipeId===UI.filtroEquipe;});
  var regs=fin.map(function(d){var c=calcDia(d);
    return{id:d.id,operadorId:d.operadorId,operadorNome:d.operadorNome,equipeId:d.equipeId,
      data:d.data,efic:c.efic,pecas:c.totPecas,pontos:c.totPontos,disp:c.disp,
      metaEficiencia:d.metaEficiencia,faixas:d.faixas};
  });
  return regs;
}
function screenEficiencia(){
  var regs=dadosEficiencia();
  /* botões de filtro de equipe — sempre visíveis */
  var optsEq='<option value="todas" style="color:#0f172a;background:#fff;font-weight:700"'+(UI.filtroEquipe==="todas"?" selected":"")+'>🏭 Todas as equipes</option>'+
    DB.equipes.map(function(e){
      return '<option value="'+e.id+'" style="color:#0f172a;background:#fff;font-weight:600"'+(UI.filtroEquipe===e.id?" selected":"")+'>'+esc(e.nome)+'</option>';
    }).join("");

  var gradHead='<div style="background:linear-gradient(120deg,var(--navy),var(--navy2));padding:16px 22px;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px">'+
    '<div style="display:flex;align-items:center;gap:15px">'+
      '<div style="width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.13);display:flex;align-items:center;justify-content:center;font-size:23px;border:1px solid rgba(255,255,255,.2);flex-shrink:0">📈</div>'+
      '<div>'+
        '<div style="font-size:18px;font-weight:800;letter-spacing:.3px;line-height:1.15">DASHBOARD DE EFICIÊNCIA</div>'+
        '<div style="font-size:11px;color:rgba(255,255,255,.62);font-weight:600;margin-top:4px">Ranking individual, evolução diária e indicadores de desempenho</div>'+
      '</div>'+
    '</div>'+
    '<div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">'+
      '<select data-act="filtroEquipe" style="background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35);color:#fff;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;outline:none;min-width:180px">'+optsEq+'</select>'+
      '<button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)" data-act="exportDashPDF"><span class="ic">🖨️</span>PDF</button>'+
      '<button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)" data-act="exportDashXLS"><span class="ic">📊</span>Excel</button>'+
    '</div>'+
  '</div>';
  if(!regs.length){
    return '<div class="card" style="overflow:hidden">'+gradHead+
      '<div class="card-pad"><div class="empty"><div class="big">📈</div>Nenhum dia finalizado para análise.<br>Registre e finalize dias na tela de Lançamentos.</div></div></div>';
  }
  /* KPIs */
  var meta=DB.config.metaEficiencia;
  var mediaGeral=regs.reduce(function(s,r){return s+r.efic;},0)/regs.length;
  var dentro=regs.filter(function(r){return r.efic>=meta;}).length;
  var ops={};regs.forEach(function(r){ops[r.operadorId]=1;});
  var melhor=regs.reduce(function(m,r){return r.efic>m?r.efic:m;},0);

  /* ranking por operador */
  var porOp={};
  regs.forEach(function(r){
    if(!porOp[r.operadorId])porOp[r.operadorId]={nome:r.operadorNome,equipeId:r.equipeId,efs:[],pontos:0,pecas:0};
    porOp[r.operadorId].efs.push(r.efic);porOp[r.operadorId].pontos+=r.pontos;porOp[r.operadorId].pecas+=r.pecas;
  });
  var ranking=Object.keys(porOp).map(function(k){var o=porOp[k];
    return{nome:o.nome,equipeId:o.equipeId,dias:o.efs.length,pontos:o.pontos,pecas:o.pecas,
      media:o.efs.reduce(function(s,x){return s+x;},0)/o.efs.length};
  }).sort(function(a,b){return b.media-a.media;});
  var maxMedia=Math.max.apply(null,ranking.map(function(r){return r.media;}));

  /* evolução diária */
  var porData={};
  regs.forEach(function(r){if(!porData[r.data])porData[r.data]=[];porData[r.data].push(r.efic);});
  var serie=Object.keys(porData).sort().map(function(dt){
    return{label:brDate(dt).slice(0,5),value:porData[dt].reduce(function(s,x){return s+x;},0)/porData[dt].length};
  });

  /* resumo por equipe */
  var porEq={};
  regs.forEach(function(r){if(!porEq[r.equipeId])porEq[r.equipeId]={efs:[],dias:0};porEq[r.equipeId].efs.push(r.efic);});
  var eqRows=Object.keys(porEq).map(function(k){var e=porEq[k];
    var m=e.efs.reduce(function(s,x){return s+x;},0)/e.efs.length;
    return{nome:equipeNome(k),dias:e.efs.length,media:m};
  }).sort(function(a,b){return b.media-a.media;});

  var rankRows=ranking.map(function(r,i){
    var cor=corEfic(r.media);var w=maxMedia>0?(r.media/maxMedia*100):0;
    var posCls=i===0?" top":(i===1?" top2":(i===2?" top3":""));
    return '<div class="rank-row'+(i===0?" lead":"")+'">'+
      '<div class="rank-pos'+posCls+'">'+(i+1)+'</div>'+
      '<div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;gap:8px">'+
        '<span style="font-weight:700;font-size:12px">'+esc(r.nome)+'</span>'+

function faixaDistrib(regs){
  return DB.config.faixas.map(function(f){
    var n=regs.filter(function(r){return r.efic>=f.de&&r.efic<=f.ate;}).length;
    var pct=regs.length?(n/regs.length*100):0;

        '</div>'+
        '<div style="display:flex;align-items:center;gap:6px">'+
          '<span style="font-size:12px;font-weight:800;color:var(--navy)">'+n+'</span>'+

        '</div>'+
      '</div>'+
      '<div style="height:9px;background:var(--line2);border-radius:5px;overflow:hidden">'+
        '<div style="height:100%;border-radius:5px;background:'+f.cor+';width:'+pct.toFixed(0)+'%;opacity:.85"></div>'+
      '</div>'+
    '</div>';
  }).join("");
}
function lineChartSVG(serie,meta){
  if(!serie.length)return '<div class="empty">Sem dados</div>';
  var W=580,H=220,pad={t:26,r:20,b:36,l:44};
  var iw=W-pad.l-pad.r,ih=H-pad.t-pad.b;
  var vals=serie.map(function(s){return s.value;});
  var mn=Math.max(0,Math.min.apply(null,vals.concat([meta]))-14);
  var mx=Math.max.apply(null,vals.concat([meta]))+14;
  var rng=(mx-mn)||1;
  var X=function(i){return serie.length>1?pad.l+i/(serie.length-1)*iw:pad.l+iw/2;};
  var Y=function(v){return pad.t+ih-(v-mn)/rng*ih;};
  /* grid */
  var grid='<rect x="'+pad.l+'" y="'+pad.t+'" width="'+iw+'" height="'+ih+'" fill="none" stroke="#f1f5f9" stroke-width="1"/>';
  [0,0.25,0.5,0.75,1].forEach(function(t){
    var v=mn+rng*t;
    grid+='<line x1="'+pad.l+'" x2="'+(W-pad.r)+'" y1="'+Y(v)+'" y2="'+Y(v)+'" stroke="#eef2f8" stroke-dasharray="3,3"/>'+
      '<text x="'+(pad.l-8)+'" y="'+(Y(v)+3.5)+'" text-anchor="end" font-size="8.5" fill="#94a3b8" font-family="Segoe UI,sans-serif">'+nf(v,0)+'%</text>';
  });
  /* meta line */
  var metaLine=
    '<line x1="'+pad.l+'" x2="'+(W-pad.r)+'" y1="'+Y(meta)+'" y2="'+Y(meta)+'" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>'+
    '<rect x="'+(W-pad.r-86)+'" y="'+(Y(meta)-12)+'" width="86" height="14" rx="3" fill="#fffbeb" opacity=".9"/>'+
    '<text x="'+(W-pad.r-43)+'" y="'+(Y(meta)-2)+'" text-anchor="middle" font-size="8.5" font-weight="700" fill="#b45309" font-family="Segoe UI,sans-serif">Início meta '+nf(meta,1)+'%</text>';
  /* area path */
  var pts=serie.map(function(s,i){return X(i)+","+Y(s.value);}).join(" ");
  var area="M"+X(0)+","+(pad.t+ih)+" "+serie.map(function(s,i){return "L"+X(i)+","+Y(s.value);}).join(" ")+" L"+X(serie.length-1)+","+(pad.t+ih)+" Z";
  /* dots + labels */
  var dots=serie.map(function(s,i){
    var cor=corEfic(s.value);
    var acima=s.value>=meta;
    return '<circle cx="'+X(i)+'" cy="'+Y(s.value)+'" r="5" fill="'+cor+'" stroke="#fff" stroke-width="2.5" filter="drop-shadow(0 1px 2px rgba(0,0,0,.15))"/>'+
      '<text x="'+X(i)+'" y="'+(Y(s.value)-13)+'" text-anchor="middle" font-size="9" font-weight="700" fill="'+cor+'" font-family="Segoe UI,sans-serif">'+nf(s.value,1)+'</text>'+
      '<text x="'+X(i)+'" y="'+(H-pad.b+14)+'" text-anchor="middle" font-size="8.5" fill="#94a3b8" font-family="Segoe UI,sans-serif">'+esc(s.label)+'</text>';
  }).join("");
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="overflow:visible">'+
    '<defs>'+
      '<linearGradient id="ag2" x1="0" y1="0" x2="0" y2="1">'+
        '<stop offset="0%" stop-color="#0d2342" stop-opacity=".18"/>'+
        '<stop offset="100%" stop-color="#0d2342" stop-opacity="0"/>'+
      '</linearGradient>'+
    '</defs>'+
    grid+metaLine+
    '<path d="'+area+'" fill="url(#ag2)"/>'+
    (serie.length>1?'<polyline points="'+pts+'" fill="none" stroke="#0d2342" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round"/>':"")+
    dots+'</svg>';
}

function modalShell(title,sub,bodyHTML,footHTML){

    '<button class="modal-x" data-act="fecharModal">×</button></div>'+

/* —— Diálogo de confirmação (substitui o confirm() nativo) ——
   Retorna uma Promise com a chave do botão escolhido (ou cancelKey ao fechar). */
function askDialog(opts){
  opts=opts||{};
  return new Promise(function(resolve){
    var danger=!!opts.danger;
    var icon=opts.icon||(danger?"⚠️":"❔");
    var iconBg=danger?"linear-gradient(135deg,var(--red),var(--red-d))":"linear-gradient(135deg,var(--blue),var(--blue-d))";
    var body='<div style="display:flex;gap:14px;align-items:flex-start">'+
      '<div style="width:42px;height:42px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;background:'+iconBg+';box-shadow:0 2px 10px rgba(13,35,66,.2)">'+icon+'</div>'+
      '<div style="font-size:13px;color:var(--ink2);line-height:1.6;white-space:pre-line;padding-top:3px">'+esc(opts.msg||"")+'</div></div>';
    var buttons=opts.buttons||[
      {key:"no",label:opts.cancelLabel||"Cancelar",cls:"btn-ghost"},
      {key:"yes",label:opts.okLabel||"Confirmar",cls:danger?"btn-red":"btn-primary"}
    ];
    var cancelKey=(opts.cancelKey!==undefined)?opts.cancelKey:"no";
    var foot=buttons.map(function(b){
      return '<button class="btn '+(b.cls||"btn-ghost")+'" data-ask="'+esc(b.key)+'">'+esc(b.label)+'</button>';
    }).join("");
    openModal(modalShell(opts.title||"Confirmar",opts.sub||"",body,foot));
    var host=document.getElementById("modalHost");
    function done(val){host.removeEventListener("click",onClick);document.removeEventListener("keydown",onKey);closeModal();resolve(val);}
    function onClick(e){
      var t=e.target.closest("[data-ask],[data-act]");
      if(!t)return;
      if(t.hasAttribute("data-ask")){done(t.getAttribute("data-ask"));return;}
      var a=t.getAttribute("data-act");
      if(a==="fecharModal"||a==="bgClose")done(cancelKey);
    }
    function onKey(e){if(e.key==="Escape")done(cancelKey);}
    host.addEventListener("click",onClick);
    document.addEventListener("keydown",onKey);
    var def=host.querySelector('[data-ask="yes"]')||host.querySelector("[data-ask]:last-child");

/* Modal: mapeador de colunas para importação de roteiros */
function showColumnMapper(headers, sampleRows, cb){
  var opts = '<option value="-1">— (ignorar)</option>'+headers.map(function(h,i){return '<option value="'+i+'">'+esc(h||('Col '+(i+1)))+'</option>';}).join('');
  var body = '<div style="display:flex;flex-direction:column;gap:12px">'+
    '<div style="font-size:13px;font-weight:700">Mapear colunas do arquivo</div>'+
    '<div style="font-size:12px;color:var(--ink4)">Selecione qual coluna corresponde a cada campo do sistema. Você pode ignorar colunas não relevantes.</div>'+
    '<div class="row2">'+
      '<div class="field"><label>Referências do modelo</label><select id="map_modeloRef" class="inp">'+opts+'</select></div>'+
      '<div class="field"><label>Nome do modelo</label><select id="map_modeloNome" class="inp">'+opts+'</select></div>'+
    '</div>'+
    '<div class="row2">'+
      '<div class="field"><label>Código da operação</label><select id="map_operacaoId" class="inp">'+opts+'</select></div>'+
      '<div class="field"><label>Nome da operação</label><select id="map_operacaoNome" class="inp">'+opts+'</select></div>'+
    '</div>'+
    '<div class="row2">'+
      '<div class="field"><label>Máquina / equipamento</label><select id="map_maquina" class="inp">'+opts+'</select></div>'+
      '<div class="field"><label>Tempo da operação</label><select id="map_tempo" class="inp">'+opts+'</select></div>'+
    '</div>'+
    '<div style="font-size:12px;color:var(--ink4);margin-top:6px">Exemplo dos primeiros valores por coluna:</div>'+
    '<div style="overflow:auto;border:1px solid var(--line);border-radius:6px;padding:8px">';
  body += '<table style="width:100%;font-size:12px;border-collapse:collapse">';
  body += '<thead><tr>' + headers.map(function(h){return '<th style="text-align:left;padding:6px;border-bottom:1px solid var(--line)">'+esc(h||'')+'</th>';}).join('') + '</tr></thead>';
  body += '<tbody>';
  for(var r=0;r<Math.min(sampleRows.length,5);r++){
    var row = sampleRows[r]||[];
    body += '<tr>' + headers.map(function(_,i){return '<td style="padding:6px;border-bottom:1px solid rgba(0,0,0,0.03)">'+esc(String(row[i]||''))+'</td>';}).join('') + '</tr>';
  }
  body += '</tbody></table>';
  body += '</div></div>';
  var foot = '<button class="btn btn-ghost" data-act="fecharModal">Cancelar</button>'+
    '<button class="btn btn-green" data-act="doMapImport"><span class="ic">✓</span>Importar com este mapeamento</button>';
  MODAL.mapCallback = cb;
  openModal(modalShell('Mapear colunas','Confirme o mapeamento antes de importar',body,foot), true);
  /* sugestão automática usando distância Levenshtein + limiar ajustável
     - evita mapear o mesmo índice para múltiplos campos
     - um controle de limiar é exibido para ajuste pelo usuário
  */
  function levenshtein(a,b){
    a=String(a||"").toLowerCase(); b=String(b||"").toLowerCase();
    var n=a.length,m=b.length; if(n==0) return m; if(m==0) return n;
    var dp=[]; for(var i=0;i<=n;i++){dp[i]=[];dp[i][0]=i;} for(var j=0;j<=m;j++){dp[0][j]=j;}
    for(var i=1;i<=n;i++) for(var j=1;j<=m;j++){var cost=(a.charAt(i-1)===b.charAt(j-1)?0:1); dp[i][j]=Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost);} return dp[n][m];
  }
  // retorna um objeto com sugestões únicas por campo, ou -1
  function suggestUnique(patternsMap, headers, threshold){
    var H = headers.map(function(x){return String(x||"").toLowerCase().trim();});
    var fields = Object.keys(patternsMap);
    var used = {};
    var result = {};
    function scoreFor(h,p){ if(!h||!p) return -1; if(h.indexOf(p)>=0) return 1.01; var d=levenshtein(h,p); return 1 - (d/Math.max(h.length,p.length,1)); }
    // for each field, find best unused header index
    for(var fi=0;fi<fields.length;fi++){
      var key = fields[fi];
      var patterns = patternsMap[key];
      var bestIdx=-1, bestScore=-9;
      for(var i=0;i<H.length;i++){
        if(used[i]) continue;
        var h = H[i];
        for(var pI=0;pI<patterns.length;pI++){
          var p = patterns[pI]; if(!p) continue;
          var s = scoreFor(h,p);
          if(s>bestScore){bestScore=s; bestIdx=i;}
          if(s>1.0){ bestScore=s; bestIdx=i; break; }
        }
      }
      if(bestScore>=threshold && bestIdx>=0){ result[key]=bestIdx; used[bestIdx]=1; } else { result[key]=-1; }
    }
    return result;
  }
  // construir controle de limiar no topo do modal
  var thrId = 'mapFuzzyThr';
  var thrHtml = '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">'+
    '<label style="font-size:12px;color:var(--ink3);font-weight:600">Limiar fuzzy</label>'+
    '<input id="'+thrId+'" type="range" min="0" max="100" value="45" style="flex:1">'+
    '<div id="'+thrId+'_val" style="width:42px;text-align:right;font-size:12px;color:var(--ink4)">0.45</div>'+
    '</div>';
  // inserir antes do exemplo de primeiros valores
  var modalBodyEl = document.querySelector('.modalShell') || null;
  // aplicar sugestões após abrir modal
  setTimeout(function(){
    try{
      var container = document.querySelector('.modal .body');
      if(container){
        var top = container.querySelector('div');
        // inserir controle se não existir
        if(!document.getElementById(thrId)){
          container.insertAdjacentHTML('afterbegin', thrHtml);
          var rng = document.getElementById(thrId);
          var val = document.getElementById(thrId+'_val');
          rng.addEventListener('input', function(){ var v = (Number(rng.value)/100).toFixed(2); val.textContent = v; });
        }
      }
    }catch(e){console.warn(e);} },40);

  setTimeout(function(){
    try{
      var rangeEl = document.getElementById('mapFuzzyThr');
      var threshold = rangeEl?(Number(rangeEl.value)/100):0.45;
      var patternsMapLocal={
        modeloRef:["referencia","referência","ref","modeloreferencia","referencias do modelo","referencia_modelo","referencia modelo"],
        modeloNome:["nome do modelo","modelonome","modelo","nome modelo","nome do modelo"],
        operacaoId:["codigo da operacao","cod operacao","operacaoid","operacao id","codigo","cod_operacao"],
        operacaoNome:["nome da operacao","operacao","operacao nome","operacaonome","descricao","descrição"],
        maquina:["maquina","máquina","equipamento","maquina/equipamento","equipamento nome","equipamento utilizado"],
        tempo:["tempo","tempo (min)","tempo_min","tempo da operacao","tempo padrao","tempo_minuto"]
      };
      var sug = suggestUnique(patternsMapLocal, headers, threshold);
      function applyIf(elid, v){ if(document.getElementById(elid) && v>=0) document.getElementById(elid).value = String(v); }
      applyIf('map_modeloRef', sug.modeloRef);
      applyIf('map_modeloNome', sug.modeloNome);
      applyIf('map_operacaoId', sug.operacaoId);
      applyIf('map_operacaoNome', sug.operacaoNome);
      applyIf('map_maquina', sug.maquina);
      applyIf('map_tempo', sug.tempo);
    }catch(e){console.warn(e);} },120);
}

function crc32(bytes){
  var t=crc32.tab;
  if(!t){t=crc32.tab=[];for(var n=0;n<256;n++){var c=n;for(var k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}}
  var crc=0xFFFFFFFF;
  for(var i=0;i<bytes.length;i++)crc=(crc>>>8)^t[(crc^bytes[i])&0xFF];
  return (crc^0xFFFFFFFF)>>>0;
}
function strBytes(s){return new TextEncoder().encode(s);}
function zipStore(files){
  var chunks=[],central=[],offset=0;
  function u16(n){return [n&255,(n>>8)&255];}
  function u32(n){return [n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];}
  files.forEach(function(f){
    var nameB=strBytes(f.name),crc=crc32(f.data);
    var local=[80,75,3,4].concat(u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(f.data.length),u32(f.data.length),u16(nameB.length),u16(0));
    chunks.push(new Uint8Array(local),nameB,f.data);
    var cen=[80,75,1,2].concat(u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(f.data.length),u32(f.data.length),
      u16(nameB.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset));
    central.push({head:new Uint8Array(cen),name:nameB});
    offset+=local.length+nameB.length+f.data.length;
  });
  var cstart=offset,csize=0;
  central.forEach(function(c){chunks.push(c.head,c.name);csize+=c.head.length+c.name.length;});
  chunks.push(new Uint8Array([80,75,5,6].concat(u16(0),u16(0),u16(files.length),u16(files.length),u32(csize),u32(cstart),u16(0))));
  var total=chunks.reduce(function(s,c){return s+c.length;},0),out=new Uint8Array(total),p=0;
  chunks.forEach(function(c){out.set(c,p);p+=c.length;});
  return out;
}
function colLetter(i){var s="";i++;while(i>0){var m=(i-1)%26;s=String.fromCharCode(65+m)+s;i=(i-m-1)/26;}return s;}
function xmlEsc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&apos;"}[c];});}
function sheetXML(rows){
  var body="";
  rows.forEach(function(row,ri){
    var cells="";
    (row||[]).forEach(function(v,ci){
      var ref=colLetter(ci)+(ri+1);
      if(typeof v==="number"&&isFinite(v))cells+='<c r="'+ref+'"><v>'+v+'</v></c>';
      else cells+='<c r="'+ref+'" t="inlineStr"><is><t xml:space="preserve">'+xmlEsc(v)+'</t></is></c>';
    });
    body+='<row r="'+(ri+1)+'">'+cells+'</row>';
  });
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>'+body+'</sheetData></worksheet>';
}
function buildXLSX(sheets){
  var files=[];
  var types='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'+
    '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>'+
    '<Default Extension="xml" ContentType="application/xml"/>'+
    '<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>';
  sheets.forEach(function(s,i){types+='<Override PartName="/xl/worksheets/sheet'+(i+1)+'.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>';});
  types+='</Types>';
  files.push({name:"[Content_Types].xml",data:strBytes(types)});
  files.push({name:"_rels/.rels",data:strBytes('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+
    '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>')});
  var wbS="",wbR="";
  sheets.forEach(function(s,i){
    wbS+='<sheet name="'+xmlEsc(String(s.name).slice(0,31))+'" sheetId="'+(i+1)+'" r:id="rId'+(i+1)+'"/>';
    wbR+='<Relationship Id="rId'+(i+1)+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet'+(i+1)+'.xml"/>';
  });
  files.push({name:"xl/workbook.xml",data:strBytes('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'+
    '<sheets>'+wbS+'</sheets></workbook>')});
  files.push({name:"xl/_rels/workbook.xml.rels",data:strBytes('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+wbR+'</Relationships>')});
  sheets.forEach(function(s,i){files.push({name:"xl/worksheets/sheet"+(i+1)+".xml",data:strBytes(sheetXML(s.rows))});});
  return zipStore(files);
}
function downloadBytes(bytes,filename,mime){
  var blob=new Blob([bytes],{type:mime||"application/octet-stream"});
  var url=URL.createObjectURL(blob),a=document.createElement("a");

  setTimeout(function(){URL.revokeObjectURL(url);a.remove();},900);
}
function exportarXLSX(sheets,filename){
  try{downloadBytes(buildXLSX(sheets),filename,"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet");

function decodeBuf(buf){
  var u=new TextDecoder("utf-8").decode(buf);
  if(u.indexOf("�")>=0){try{return new TextDecoder("windows-1252").decode(buf);}catch(e){return u;}}
  return u;
}
function parseCSV(text){
  var lines=text.replace(/\r/g,"").split("\n").filter(function(l){return l.trim()!=="";});
  if(!lines.length)return[];
  var delim=(lines[0].split(";").length>=lines[0].split(",").length)?";":",";
  return lines.map(function(l){return l.split(delim).map(function(c){return c.replace(/^"|"$/g,"").trim();});});
}
function pickFile(accept,cb){
  var inp=document.createElement("input");
  inp.type="file";inp.accept=accept;
  inp.onchange=function(){if(inp.files&&inp.files[0])cb(inp.files[0]);};
  inp.click();
}
function ensureXLSX(cb){
  if(window.XLSX){cb(true);return;}
  var s=document.createElement("script");
  s.src="lib/xlsx.full.min.js";
  s.onload=function(){cb(!!window.XLSX);};
  s.onerror=function(){cb(false);};
  document.head.appendChild(s);
}
/* lê CSV ou Excel (.xlsx/.xls) e devolve uma matriz de linhas */
function readTabular(file,cb){
  var nome=(file.name||"").toLowerCase();
  if(nome.indexOf(".xlsx")>=0||nome.indexOf(".xls")>=0){
    toast("Lendo planilha Excel...","");
    ensureXLSX(function(ok){
      if(!ok){toast("Não foi possível carregar o leitor de Excel. Salve a planilha como CSV e importe.","err");return;}
      var fr=new FileReader();
      fr.onload=function(){
        try{
          var wb=XLSX.read(new Uint8Array(fr.result),{type:"array"});
          var ws=wb.Sheets[wb.SheetNames[0]];
          var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:""});
          cb((rows||[]).map(function(r){return (r||[]).map(function(c){return String(c==null?"":c).trim();});}));
        }catch(e){toast("Erro ao ler o arquivo Excel","err");}
      };
      fr.onerror=function(){toast("Erro ao abrir o arquivo","err");};
      fr.readAsArrayBuffer(file);
    });
  }else{
    var fr=new FileReader();
    fr.onload=function(){cb(parseCSV(decodeBuf(fr.result)));};
    fr.onerror=function(){toast("Erro ao abrir o arquivo","err");};
    fr.readAsArrayBuffer(file);
  }
}
function importRoteiros(){
  pickFile(".csv,.txt,.xlsx,.xls",function(file){
    readTabular(file,function(rows){
      if(rows.length<2){toast("Arquivo vazio ou inválido","err");return;}
      var headIdx=0;
      for(var h=0;h<Math.min(6,rows.length);h++){
        var cand=(rows[h]||[]).map(function(c){return String(c||"").toLowerCase().trim();}).join("|");
        if(cand.indexOf("referencia")>=0||cand.indexOf("referência")>=0||cand.indexOf("ref")>=0||cand.indexOf("modelo")>=0||cand.indexOf("operacao")>=0||cand.indexOf("operação")>=0||cand.indexOf("tempo")>=0){headIdx=h;break;}
      }
      var head=(rows[headIdx]||[]).map(function(h){return String(h).toLowerCase().trim();});
      function col(){for(var i=0;i<arguments.length;i++){var idx=head.indexOf(arguments[i].toLowerCase());if(idx>=0)return idx;}return -1;}
      var cRef=col("modeloreferencia","ref. modelo","referencia","referência","ref","referencia modelo","modelo referencia","ref id","id referencia","referencias do modelo","referências do modelo"),
          cMod=col("modelonome","modelo","nome modelo","nome do modelo","modelo nome","nome do modelo"),
          cOid=col("operacaoid","oper. id","cod operacao","operacao id","codigo operacao","código operacao","operacao codigo","cod operação","codigo","código","código da operação","codigo da operacao"),
          cOnm=col("operacaonome","operacao","operação","nome operacao","nome da operacao","operacao nome","descrição","descricao","nome da operação","nome da operacao"),
          cMaq=col("maquinaequipamentonome","maquina","máquina","equipamento","equipamento nome","maquina/equipamento","máquina/equipamento","máquina ou equipamento","equipamento utilizado"),
          cTmp=col("tempo","tempo (min)","tempo padrao","tempo padrão","tempo min","tempo minimo","tempo mínimo","tempo previsto","tempo da operação","tempo da operacao","tempo operacional");

      /* se não encontrou os campos essenciais, tenta detectar pelas colunas de dados */
      if(cRef<0||cOnm<0||cTmp<0){
        var cols=0; for(var i=headIdx;i<Math.min(rows.length, headIdx+6);i++){cols=Math.max(cols,(rows[i]||[]).length);} cols=Math.max(cols, head.length);
        var stats=[]; for(var j=0;j<cols;j++){stats[j]={num:0,alpha:0,alnum:0,nonempty:0,len:0,samples:[]};}
        for(var r=headIdx+1;r<Math.min(rows.length, headIdx+51);r++){
          var row=rows[r]||[];
          for(var j=0;j<cols;j++){var v=String(row[j]||"").trim(); if(!v) continue; stats[j].nonempty++; stats[j].len+=v.length; stats[j].samples.push(v);
            var hasDigit=/\d/.test(v), hasLetter=/[a-záàâãéèêíïóôõúç\- ]/i.test(v);
            if(hasDigit && hasLetter) stats[j].alnum++; else if(hasDigit) stats[j].num++; else if(hasLetter) stats[j].alpha++;
          }
        }
        for(var j=0;j<cols;j++){var s=stats[j]; s.avgLen = s.nonempty?Math.round(s.len/s.nonempty):0; s.numProp = s.nonempty? s.num/s.nonempty:0; s.alphaProp = s.nonempty? s.alpha/s.nonempty:0; s.alnumProp = s.nonempty? s.alnum/s.nonempty:0;}

        /* heurísticas: tempo = coluna com mais números e valores plausíveis */
        var bestTmp=-1, bestTmpScore=0;
        for(var j=0;j<cols;j++){var s=stats[j]; if(s.nonempty==0) continue; var score=s.numProp; if(s.avgLen>6) score*=0.6; if(score>bestTmpScore){bestTmpScore=score; bestTmp=j;}}
        if(bestTmp>=0) cTmp = (cTmp<0?bestTmp:cTmp);

        /* operação nome = coluna com maior proporção de letras e comprimento */
        var bestOpn=-1, bestOpnScore=0;
        for(var j=0;j<cols;j++){var s=stats[j]; var score=s.alphaProp * (1+Math.min(s.avgLen/20,1)); if(score>bestOpnScore){bestOpnScore=score; bestOpn=j;}}
        if(bestOpn>=0) cOnm = (cOnm<0?bestOpn:cOnm);

        /* referência = coluna com muitos alnum ou curto com mistura */
        var bestRef=-1, bestRefScore=0;
        for(var j=0;j<cols;j++){var s=stats[j]; var score=s.alnumProp*1.2 + (s.nonempty? (1/(1+s.avgLen)):0); if(score>bestRefScore){bestRefScore=score; bestRef=j;}}
        if(bestRef>=0) cRef = (cRef<0?bestRef:cRef);

        /* código operação = coluna curta, com muitos números, diferente do tempo */
        var bestOid=-1, bestOidScore=0;
        for(var j=0;j<cols;j++){var s=stats[j]; if(j==cTmp) continue; var score=s.numProp * (1/(1+s.avgLen)); if(score>bestOidScore){bestOidScore=score; bestOid=j;}}
        if(bestOid>=0) cOid = (cOid<0?bestOid:cOid);

        /* máquina = coluna cujo cabeçalho ou valores contenham palavras relacionadas */
        var maqKeys=["maquina","máquina","equip","equipamento","machine","press","corte","costura","serra","mesa"];
        var bestM=-1, bestMScore=0;
        for(var j=0;j<cols;j++){
          var score=0; var h=head[j]||""; maqKeys.forEach(function(k){ if(h.indexOf(k)>=0) score+=2; });
          (stats[j].samples||[]).forEach(function(v){ maqKeys.forEach(function(k){ if(String(v||"").toLowerCase().indexOf(k)>=0) score+=1; }); });
          if(score>bestMScore){bestMScore=score; bestM=j;}
        }
        if(bestM>=0) cMaq = (cMaq<0?bestM:cMaq);

        if(cRef<0||cOnm<0||cTmp<0){toast("Cabeçalho não reconhecido. Tentativa automática aplicada; verifique os mapeamentos.","warn");}
      }

      function doBuildAndSave(mapping){
        var mRef=mapping.modeloRef, mMod=mapping.modeloNome, mOid=mapping.operacaoId, mOnm=mapping.operacaoNome, mMaq=mapping.maquina, mTmp=mapping.tempo;
        var novas=[];
        for(var i=headIdx+1;i<rows.length;i++){
          var r=rows[i]; if(!r) continue; var hasRef=(mRef>=0? (r[mRef]||"") : ""); var hasOp=(mOnm>=0? (r[mOnm]||"") : "");
          if(!hasRef && !hasOp) continue;
          novas.push({id:uid(),modeloRef:mRef>=0?(r[mRef]||""):"",modeloNome:mMod>=0?(r[mMod]||""):"",
            operacaoId:mOid>=0?(r[mOid]||""):"",operacaoNome:mOnm>=0?(r[mOnm]||""):"",
            maquina:mMaq>=0?(r[mMaq]||""):"",tempo:pnum(mTmp>=0?(r[mTmp]||""):"")});
        }
        if(!novas.length){toast("Nenhuma operação válida encontrada","err");return;}
        askConfirm({title:"Importar roteiros",msg:"Importar "+novas.length+" operações?\nIsso substituirá os roteiros atuais ("+DB.operacoes.length+").",okLabel:"Importar"}).then(function(okv){
          if(!okv)return;
          DB.operacoes=novas;DB.config.roteirosImportados=true;saveDB();render();toast(novas.length+" roteiros importados","ok");
        });
      }

      /* abrir modal de mapeamento se necessário ou se for importação simplificada */
      if(typeof MODAL !== 'undefined' && MODAL.forceMap){
        showColumnMapper(head, rows.slice(headIdx+1, headIdx+6), function(map){ doBuildAndSave(map); });
        MODAL.forceMap=false;
      }else if(cRef<0||cOnm<0||cTmp<0){
        showColumnMapper(head, rows.slice(headIdx+1, headIdx+6), function(map){ doBuildAndSave(map); });
      }else{
        doBuildAndSave({modeloRef:cRef,modeloNome:cMod,operacaoId:cOid,operacaoNome:cOnm,maquina:cMaq,tempo:cTmp});
      }
    });
  });
}

function importOperadores(){
  pickFile(".csv,.txt,.xlsx,.xls",function(file){
    readTabular(file,function(rows){
      if(!rows||rows.length<2){toast("Arquivo vazio ou inválido","err");return;}
      /* Detecta automaticamente a linha de cabeçalho (busca nas primeiras 6 linhas) */
      var palavrasChave=["operador","operadora","operadores","nome","funcionario","funcionário","funcionarios","funcionários","colaborador","colaboradores","celula","célula","equipe","equipes","setor"];
      var headIdx=0;
      for(var h=0;h<Math.min(6,rows.length);h++){
        var linha=(rows[h]||[]).map(function(c){return String(c||"").toLowerCase().trim();}).join("|");
        var achou=palavrasChave.some(function(p){return linha.indexOf(p)>=0;});
        if(achou){headIdx=h;break;}
      }
      var head=(rows[headIdx]||[]).map(function(c){return String(c||"").toLowerCase().trim();});
      /* normalização p/ comparação exata: minúsculas sem pontuação/parênteses/espaços
         — cobre abreviações como "func.", "oper.", "cél.", "CEL.", "GP", "Operador(a)". */
      var headNorm=head.map(function(h){return h.replace(/[().\s]+/g,"");});
      /* Detecção tolerante: 1) título exato (normalizado); 2) cabeçalho que CONTENHA
         a palavra (cobre frases como "célula de produção", "nome do funcionário"). */
      function col(exatos,contidos){
        var i,k,idx;
        for(i=0;i<exatos.length;i++){
          var ke=exatos[i].toLowerCase().replace(/[().\s]+/g,"");
          idx=headNorm.indexOf(ke); if(idx>=0)return idx;
        }
        if(contidos)for(i=0;i<contidos.length;i++){
          var kc=contidos[i].toLowerCase();
          for(k=0;k<head.length;k++){if(head[k]&&head[k].indexOf(kc)>=0)return k;}
        }
