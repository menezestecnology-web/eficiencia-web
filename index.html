      }
      var cN=col(["nome completo","nome","operador","operadora","operadores","oper","funcionario","funcionário","funcionarios","funcionários","func","colaborador","colaboradores"],
                 ["operador","funcionár","funcionari","colaborador"]),
          cE=col(["equipe","equipes","celula","célula","celulas","células","cel","cél","setor","time","grupo","gp","linha"],
                 ["célula","celula","equipe","grupo","setor"]),
          cF=col(["funcao","função","funções","cargo","cargos"],
                 ["função","cargo"]);
      /* Se não achou coluna de nome, tenta encontrá-la por conteúdo nas primeiras colunas */
      if(cN<0){
        /* Procura a primeira coluna que tenha nomes reais na maioria das linhas */
        var contagens={};
        for(var r2=headIdx+1;r2<Math.min(headIdx+10,rows.length);r2++){
          var row2=rows[r2]||[];
          for(var ci=0;ci<row2.length;ci++){
            var val=String(row2[ci]||"").trim();
            if(val.length>2&&/[a-záéíóúâêîôûãõäëïöü]/i.test(val)&&!/^[0-9\.\,]+$/.test(val)){
              contagens[ci]=(contagens[ci]||0)+1;
            }
          }
        }
        var melhor=-1,maxC=0;
        Object.keys(contagens).forEach(function(k){if(contagens[k]>maxC){maxC=contagens[k];melhor=parseInt(k);}});
        if(melhor>=0)cN=melhor;
      }
      if(cN<0)cN=0;
      function nomeValido(n){return n&&n.length>1&&!/^[Øø0\-_\.\s\/\\]+$/.test(n)&&/[a-záéíóúâêîôûãõäëïöü]/i.test(n);}
      function _doImport(substituir){
        if(substituir){DB.operadores=[];DB.equipes=[];}
      var add=0,dup=0;
      for(var i=headIdx+1;i<rows.length;i++){
        var r=rows[i];if(!r)continue;
        var nome=String(r[cN]||"").trim();
        if(!nomeValido(nome))continue;
        if(DB.operadores.some(function(o){return o.nome.toLowerCase()===nome.toLowerCase();})){dup++;continue;}
        var eqNm=cE>=0?String(r[cE]||"").trim():"";
        var eq=DB.equipes.find(function(x){return x.nome.toLowerCase()===eqNm.toLowerCase();});
        if(!eq){
          if(eqNm){eq={id:uid(),nome:eqNm};DB.equipes.push(eq);}
          else if(DB.equipes.length){eq=DB.equipes[0];}
          else{eq={id:uid(),nome:"Equipe Geral"};DB.equipes.push(eq);}
        }
        var funcao=cF>=0?String(r[cF]||"").trim():"";
        DB.operadores.push({id:uid(),nome:nome,equipeId:eq.id,funcao:funcao});
        add++;
      }
      if(add){
        /* reconectar dias existentes às novas equipes pelo nome do operador */
        DB.dias.forEach(function(d){
          var op=DB.operadores.find(function(o){return o.nome.toLowerCase()===d.operadorNome.toLowerCase();});
          if(op){d.operadorId=op.id;d.equipeId=op.equipeId;}
        });
        saveDB();render();toast(add+" operadores importados"+(dup?" ("+dup+" já existiam)":""),"ok");
      }
      else toast(dup?"Todos os operadores já estavam cadastrados":"Nenhum operador válido encontrado — verifique o arquivo","err");
      }
      if(DB.operadores.length){
        askDialog({title:"Importar operadores",msg:"Já há "+DB.operadores.length+" operador(es) cadastrado(s).\n\nComo deseja importar?",buttons:[{key:"add",label:"Adicionar aos existentes",cls:"btn-ghost"},{key:"sub",label:"Substituir tudo",cls:"btn-red"}],cancelKey:null}).then(function(k){if(!k)return;_doImport(k==="sub");});
      }else _doImport(false);
    });
  });
}
function backupImport(){
  pickFile(".json",function(file){
    var fr=new FileReader();
    fr.onload=function(){
      try{
        var obj=JSON.parse(fr.result);
        if(!obj||!Array.isArray(obj.operadores)||!Array.isArray(obj.dias)){toast("Arquivo de backup inválido","err");return;}
        askConfirm({title:"Restaurar backup",msg:"Restaurar backup? Os dados atuais serão substituídos.",danger:true,okLabel:"Restaurar"}).then(function(okv){
          if(!okv)return;
          DB=obj;
          /* migração de campos ausentes para compatibilidade com backups antigos */
          if(!DB.empresa)DB.empresa={nome:"Empresa",logo:""};
          if(!DB.equipes)DB.equipes=[];
          if(!DB.operacoes)DB.operacoes=[];
          if(!DB.config)DB.config={jornadaPadrao:528,metaEficiencia:84.5,lancamentosAtivos:true,roteirosImportados:false,tiposOcorrencia:TIPOS_OCOR_PADRAO.slice(),faixas:[{de:0,ate:69.99,rotulo:"Crítico",cor:"#b91c1c"},{de:70,ate:84.49,rotulo:"Abaixo da meta",cor:"#d97706"},{de:84.5,ate:99.99,rotulo:"Dentro da meta",cor:"#2563eb"},{de:100,ate:9999,rotulo:"Excelente",cor:"#047857"}]};
          if(!DB.config.tiposOcorrencia||!DB.config.tiposOcorrencia.length)DB.config.tiposOcorrencia=TIPOS_OCOR_PADRAO.slice();
          if(!DB.config.faixas||!DB.config.faixas.length)DB.config.faixas=[{de:0,ate:69.99,rotulo:"Crítico",cor:"#b91c1c"},{de:70,ate:84.49,rotulo:"Abaixo da meta",cor:"#d97706"},{de:84.5,ate:99.99,rotulo:"Dentro da meta",cor:"#2563eb"},{de:100,ate:9999,rotulo:"Excelente",cor:"#047857"}];
          if(DB.config.lancamentosAtivos==null)DB.config.lancamentosAtivos=true;
          if(DB.config.roteirosImportados==null)DB.config.roteirosImportados=false;
          DB.dias.forEach(function(d){
            if(!d.lancamentos)d.lancamentos=[];
            if(!d.ocorrencias)d.ocorrencias=[];
            if(d.jornada==null)d.jornada=DB.config.jornadaPadrao||528;
            if(d.semOcorrencias==null)d.semOcorrencias=false;
            if(d.metaEficiencia==null)d.metaEficiencia=DB.config.metaEficiencia;
            if(!d.faixas||!d.faixas.length)d.faixas=snapCfg().faixas;
          });
          UI.dayId=DB.dias.length?DB.dias[DB.dias.length-1].id:null;
          saveDB();render();toast("Backup restaurado com sucesso","ok");
        });
      }catch(e){toast("Erro ao ler o backup","err");}
    };
    fr.readAsText(file);
  });
}

/* ════════════════════════════════════════════════════════════
   AÇÕES (event delegation)
   ════════════════════════════════════════════════════════════ */
function handleAction(act,id,el){
  var dia=diaAtual();
  /* Dia finalizado é somente-leitura: qualquer edição exige "Reabrir Dia".
     Garante o congelamento do registro (eficiência, jornada, lançamentos). */
  var acoesEdicao={novoLanc:1,editLanc:1,delLanc:1,saveLanc:1,novaOcor:1,editOcor:1,delOcor:1,saveOcor:1,pausar:1,comentario:1};
  if(acoesEdicao[act]&&dia&&dia.status==="finalizado"){
    toast('Dia finalizado — somente leitura. Clique em "Reabrir Dia" para editar.','err');return;
  }
  switch(act){
    case"nav":
      var ns=el.getAttribute("data-screen");
      UI.screen=ns;UI.buscaOp="";UI.buscaOper="";UI.modeloAtivo="";
      if(ns==="relatorios"){UI.relTipo="";UI.relModo="";}
      render();break;

    case"limparFiltrosOper":UI.buscaOper="";UI.filtroOperEquipe="todas";render();toast("Filtros limpos","ok");break;
    case"bgClose":closeModal();break;
    case"fecharModal":closeModal();break;
    case"atualizar":render();toast("Tela atualizada","ok");break;
    case"tab":UI.tab=el.getAttribute("data-tab");render();break;

    /* dias */
    case"novoDia":if(!DB.operadores.length){toast("Cadastre operadores antes de criar um dia","err");break;}
      var nd=novoDia((dia&&dia.operadorId)||DB.operadores[0].id,todayISO());UI.dayId=nd.id;UI.tab="lanc";UI.modeloAtivo="";render();toast("Novo dia criado","ok");break;
    case"abrirDia":openAbrirDiaModal();break;
    case"doAbrirDia":UI.dayId=id;UI.modeloAtivo="";closeModal();render();break;
    case"relPer":UI.relModo=el.getAttribute("data-per");render();break;
    case"limparFiltros":case"limparModelo":
      UI.modeloAtivo="";render();toast("Seleção de modelo limpa","ok");break;
    case"salvarRascunho":if(dia){dia.status="rascunho";saveDB();render();toast("Rascunho salvo","ok");}break;
    case"finalizarDia":
      if(!dia)break;
      if(!dia.lancamentos.length){toast("Adicione ao menos um lançamento","err");break;}
      if(!dia.ocorrencias.length&&!dia.semOcorrencias){
        askConfirm({title:"Finalizar sem ocorrências",msg:"Este dia não tem ocorrências registradas.\n\nDeseja finalizar declarando o dia SEM OCORRÊNCIAS?",okLabel:"Finalizar sem ocorrências",cancelLabel:"Voltar"}).then(function(okv){
          if(!okv)return;
          /* semOcorrencias só é persistido se o usuário confirmar a finalização */
          dia.semOcorrencias=true;
          congelarFinalizacao(dia);saveDB();render();toast("Dia finalizado com sucesso","ok");
        });
      }else{
        askConfirm({title:"Finalizar dia",msg:"Finalizar o dia? Os dados entrarão no Dashboard de Eficiência.",okLabel:"Finalizar"}).then(function(okv){
          if(!okv)return;
          congelarFinalizacao(dia);saveDB();render();toast("Dia finalizado com sucesso","ok");
        });
      }break;
    case"reabrirDia":if(dia){dia.status="rascunho";saveDB();render();toast("Dia reaberto para edição","ok");}break;
    case"pausar":if(dia)openOcorModal(dia,null,"PARADA / PAUSA");break;
    case"comentario":if(dia)openComentarioModal(dia);break;

    /* lançamentos */
    case"novoLanc":if(dia)openLancModal(dia,null);break;
    case"editLanc":if(dia)openLancModal(dia,id);break;
    case"delLanc":
      if(!dia)break;
      askConfirm({title:"Excluir lançamento",msg:"Excluir este lançamento?",danger:true,okLabel:"Excluir"}).then(function(okv){
        if(!okv)return;
        dia.lancamentos=dia.lancamentos.filter(function(x){return x.id!==id;});saveDB();render();
      });break;
    case"saveLanc":saveLanc();break;

    /* ocorrências */
    case"novaOcor":if(dia)openOcorModal(dia,null,null);break;
    case"editOcor":if(dia)openOcorModal(dia,id,null);break;
    case"delOcor":
      if(!dia)break;
      askConfirm({title:"Excluir ocorrência",msg:"Excluir esta ocorrência?",danger:true,okLabel:"Excluir"}).then(function(okv){
        if(!okv)return;
        dia.ocorrencias=dia.ocorrencias.filter(function(x){return x.id!==id;});saveDB();render();
      });break;
    case"saveOcor":saveOcor();break;
    case"saveComent":saveComent();break;

    /* tipos de ocorrência */
    case"editarTipos":openTiposOcorModal();break;
    case"addTipo":{
      var tA=lerTiposInputs();tA.push("");
      document.getElementById("tiposList").innerHTML=tiposRowsHTML(tA);break;}
    case"delTipo":{
      var tD=lerTiposInputs();tD.splice(Number(id),1);
      document.getElementById("tiposList").innerHTML=tiposRowsHTML(tD);break;}
    case"restaurarTipos":
      askConfirm({title:"Restaurar tipos",msg:"Restaurar a lista padrão de tipos de ocorrência?",okLabel:"Restaurar"}).then(function(okv){
        if(!okv)return;
        document.getElementById("tiposList").innerHTML=tiposRowsHTML(TIPOS_OCOR_PADRAO.slice());
      });
      break;
    case"saveTipos":saveTipos();break;

    /* exportações */
    case"exportLancPDF":if(dia)printDia(dia);break;
    case"exportLancXLS":if(dia)xlsxDia(dia);break;
    case"exportDashPDF":printDash();break;
    case"exportDashXLS":xlsxDash();break;
    case"backupXLS":backupXLS();break;

    /* operadores */
    case"novoOper":if(!DB.equipes.length){toast("Cadastre uma equipe primeiro","err");break;}openOperModal(null);break;
    case"editOper":openOperModal(id);break;
    case"delOper":
      askConfirm({title:"Excluir operador",msg:"Excluir este operador?",danger:true,okLabel:"Excluir"}).then(function(okv){
        if(!okv)return;DB.operadores=DB.operadores.filter(function(x){return x.id!==id;});saveDB();render();
      });
      break;
    case"saveOper":saveOper();break;
    case"importOper":importOperadores();break;
    case"limparOpInvalidos":
      var invalidos=DB.operadores.filter(function(o){
        var n=(o.nome||"").trim();
        return !n||n.length<2||/^[Øø0\-_\.\s\/\\]+$/.test(n);
      });
      if(!invalidos.length){toast("Nenhum operador inválido encontrado","ok");break;}
      askConfirm({title:"Remover inválidos",msg:"Encontrados "+invalidos.length+" operador(es) com nome inválido (Ø, vazio ou símbolo).\nRemover todos agora?",danger:true,okLabel:"Remover"}).then(function(okv){
        if(!okv)return;
        var ids=invalidos.map(function(o){return o.id;});
        DB.operadores=DB.operadores.filter(function(o){return ids.indexOf(o.id)<0;});
        saveDB();render();
        toast(invalidos.length+" operadores inválidos removidos","ok");
      });
      break;

    /* operações */
    case"novaOperacao":openOperacaoModal(null);break;
    case"editOperacao":openOperacaoModal(id);break;
    case"delOperacao":
      askConfirm({title:"Excluir operação",msg:"Excluir esta operação?",danger:true,okLabel:"Excluir"}).then(function(okv){
        if(!okv)return;DB.operacoes=DB.operacoes.filter(function(x){return x.id!==id;});saveDB();render();
      });
      break;
    case"saveOperacao":saveOperacao();break;
    case"doMapImport":{
      var mapFields=['modeloRef','modeloNome','operacaoId','operacaoNome','maquina','tempo'];
      var mapping={};
      mapFields.forEach(function(f){var el=document.getElementById('map_'+f); if(el) mapping[f]=Number(el.value); else mapping[f]=-1;});
      if(MODAL && typeof MODAL.mapCallback==='function'){try{MODAL.mapCallback(mapping);}catch(e){console.error(e);} }
      closeModal();
    }break;
    case"importRoteiros":importRoteiros();break;
    case"importRoteirosSimplificado":importRoteirosSimples();break;

    /* equipes */
    case"novaEquipe":openEquipeModal(null);break;
    case"editEquipe":openEquipeModal(id);break;
    case"delEquipe":
      if(DB.operadores.some(function(o){return o.equipeId===id;})){toast("Há operadores nesta equipe","err");break;}
      askConfirm({title:"Excluir equipe",msg:"Excluir esta equipe?",danger:true,okLabel:"Excluir"}).then(function(okv){
        if(!okv)return;DB.equipes=DB.equipes.filter(function(x){return x.id!==id;});saveDB();render();
      });
      break;
    case"saveEquipe":saveEquipe();break;

    /* config */
    case"salvarEmpresa":
      DB.empresa.nome=document.getElementById("cfgEmpNome").value.trim()||"Empresa";
      saveDB();render();toast("Empresa salva","ok");break;
    case"escolherLogo":
      pickFile("image/*",function(file){
        var fr=new FileReader();
        fr.onload=function(){
          var img=new Image();
          img.onload=function(){
            var max=180,w=img.width,h=img.height;
            if(w>=h){if(w>max){h=h*max/w;w=max;}}else{if(h>max){w=w*max/h;h=max;}}
            var cv=document.createElement("canvas");cv.width=w;cv.height=h;
            cv.getContext("2d").drawImage(img,0,0,w,h);
            try{DB.empresa.logo=cv.toDataURL("image/png");}catch(ex){DB.empresa.logo=fr.result;}
            saveDB();render();toast("Logotipo atualizado","ok");
          };
          img.onerror=function(){toast("Imagem inválida","err");};
          img.src=fr.result;
        };
        fr.onerror=function(){toast("Erro ao ler o arquivo","err");};
        fr.readAsDataURL(file);
      });break;
    case"removerLogo":DB.empresa.logo="";saveDB();render();toast("Logotipo removido","ok");break;
    case"salvarParams":
      DB.config.jornadaPadrao=pnum(document.getElementById("cfgJornada").value)||528;
      DB.config.metaEficiencia=pnum(document.getElementById("cfgMeta").value)||84.5;
      /* azul/vermelha unificado com as faixas: alinha a faixa "Dentro da meta" à
         meta digitada. A jornada de cada dia é editável na tela de lançamento e
         não é sobrescrita aqui. Dias em rascunho acompanham; finalizados congelam. */
      alinharFaixasComMeta(DB.config.metaEficiencia);
      registrarHistoricoFaixa();
      syncRascunhos();
      saveDB();render();toast("Parâmetros salvos · início da meta "+nf(DB.config.metaEficiencia,1)+"%","ok");break;
    case"salvarFaixas":
      var des=document.querySelectorAll(".fxDe"),ates=document.querySelectorAll(".fxAte"),rots=document.querySelectorAll(".fxRot");
      DB.config.faixas.forEach(function(f,i){
        f.de=pnum(des[i].value);f.ate=pnum(ates[i].value);f.rotulo=rots[i].value.trim()||f.rotulo;
      });
      /* o limite azul/vermelha passa a ser o início da faixa "Dentro da meta" */
      DB.config.metaEficiencia=metaDasFaixas();
      alinharFaixasComMeta(DB.config.metaEficiencia);
      registrarHistoricoFaixa();
      syncRascunhos();
      saveDB();render();toast("Faixas salvas · início da meta: "+nf(DB.config.metaEficiencia,1)+"%","ok");break;
    case"toggleLanc":
      DB.config.lancamentosAtivos=!DB.config.lancamentosAtivos;saveDB();render();
      toast(DB.config.lancamentosAtivos?"Lançamentos ativados":"Lançamentos desativados","ok");break;
    case"backupExport":
      downloadBytes(strBytes(JSON.stringify(DB,null,2)),"Backup_Sistema_Eficiencia.json","application/json");
      toast("Backup exportado","ok");break;
    case"backupImport":backupImport();break;
    case"limparDiasSemEquipe":{
      var semEq=DB.dias.filter(function(d){return !DB.equipes.some(function(e){return e.id===d.equipeId;});});
      if(!semEq.length){toast("Nenhum dia sem equipe encontrado","ok");break;}
      askConfirm({title:"Limpar dias sem equipe",msg:"Encontrados "+semEq.length+" dia(s) sem equipe válida.\nRemover todos agora?",danger:true,okLabel:"Remover"}).then(function(okv){
        if(!okv)return;
        var idsRemover=semEq.map(function(d){return d.id;});
        DB.dias=DB.dias.filter(function(d){return idsRemover.indexOf(d.id)<0;});
        UI.dayId=DB.dias.length?DB.dias[DB.dias.length-1].id:null;
        saveDB();render();toast(semEq.length+" dia(s) removido(s)","ok");
      });break;}
    case"resetApp":
      askConfirm({title:"Restaurar exemplo",msg:"Restaurar dados de exemplo? Todos os dados atuais serão apagados.",danger:true,okLabel:"Restaurar"}).then(function(okv){
        if(!okv)return;
        DB=seed();UI.dayId=DB.dias[0].id;saveDB();render();toast("Dados de exemplo restaurados","ok");
      });break;
    /* dashboard */
    case"verDia":UI.screen="lancamentos";UI.dayId=id;UI.tab="lanc";render();break;
  }
}

/* —— salvar lançamento —— */
function saveLanc(){
  var dia=getDia(MODAL.diaId);if(!dia)return;if(dia.status==="finalizado")return;
  if(!MODAL.modeloRef){toast("Selecione um modelo no campo acima","err");return;}
  if(!MODAL.opNome){toast("Selecione uma operação na lista","err");return;}
  var tipo=document.getElementById("mTipo").value;
  var tempo=pnum(document.getElementById("mTempo").value);
  var lotes=pnum(document.getElementById("mLotes").value);
  var ppl=pnum(document.getElementById("mPpl").value);
  var qtd=pnum(document.getElementById("mQtd").value);
  if(tipo==="lotes"&&(lotes<=0||ppl<=0)){toast("Informe lotes e peças por lote","err");return;}
  if(tipo==="total"&&qtd<=0){toast("Informe a quantidade total","err");return;}
  if(tempo<=0){toast("Tempo padrão inválido","err");return;}
  var wasEdit=MODAL.editId;
  var reg={id:wasEdit||uid(),hora:document.getElementById("mHora").value||nowHM(),
    modeloRef:MODAL.modeloRef,modeloNome:MODAL.modeloNome,
    operacaoId:MODAL.opId,operacaoNome:MODAL.opNome,tipo:tipo,
    lotes:tipo==="lotes"?lotes:0,pecasPorLote:tipo==="lotes"?ppl:0,
    quantidade:tipo==="total"?qtd:0,tempoPadrao:tempo};
  if(wasEdit){
    var ix=dia.lancamentos.findIndex(function(x){return x.id===wasEdit;});
    if(ix>=0)dia.lancamentos[ix]=reg;
  }else dia.lancamentos.push(reg);
  dia.lancamentos.sort(function(a,b){return (a.hora||"").localeCompare(b.hora||"");});
  saveDB();closeModal();render();toast(wasEdit?"Lançamento atualizado":"Lançamento confirmado","ok");
}
function saveOcor(){
  var dia=getDia(MODAL.diaId);if(!dia)return;if(dia.status==="finalizado")return;
  if(!dia.ocorrencias)dia.ocorrencias=[];
  var tipo=document.getElementById("oTipo").value;
  if(tipo==="__outro")tipo=(document.getElementById("oOutro").value||"").trim();
  var min=pnum(document.getElementById("oMin").value);
  if(!tipo){toast("Informe a descrição da ocorrência","err");return;}
  if(min<=0){toast("Informe os minutos","err");return;}
  var wasEdit=MODAL.editId;
  var reg={id:wasEdit||uid(),hora:document.getElementById("oHora").value||nowHM(),descricao:tipo,minutos:min};
  if(wasEdit){
    var ix=dia.ocorrencias.findIndex(function(x){return x.id===wasEdit;});
    if(ix>=0)dia.ocorrencias[ix]=reg;else dia.ocorrencias.push(reg);
  }else dia.ocorrencias.push(reg);
  dia.ocorrencias.sort(function(a,b){return (a.hora||"").localeCompare(b.hora||"");});
  dia.semOcorrencias=false;
  saveDB();closeModal();render();toast(wasEdit?"Ocorrência atualizada":"Ocorrência registrada","ok");
}
function saveComent(){
  var dia=getDia(MODAL.diaId);if(!dia)return;if(dia.status==="finalizado")return;
  dia.jornada=pnum(document.getElementById("cmJornada").value)||dia.jornada;
  dia.comentario=document.getElementById("cmTexto").value;
  saveDB();closeModal();render();toast("Observações salvas","ok");
}
function saveOper(){
  var nome=(document.getElementById("opNome").value||"").trim();
  if(!nome){toast("Informe o nome","err");return;}
  var eq=document.getElementById("opEquipe").value;
  var fn=(document.getElementById("opFuncao").value||"").trim();
  if(MODAL.editId){
    var o=DB.operadores.find(function(x){return x.id===MODAL.editId;});
    if(o){o.nome=nome;o.equipeId=eq;o.funcao=fn;}
  }else DB.operadores.push({id:uid(),nome:nome,equipeId:eq,funcao:fn});
  saveDB();closeModal();render();toast("Operador salvo","ok");
}
function saveEquipe(){
  var nome=(document.getElementById("eqNome").value||"").trim();
  if(!nome){toast("Informe o nome da equipe","err");return;}
  if(MODAL.editId){
    var e=DB.equipes.find(function(x){return x.id===MODAL.editId;});if(e)e.nome=nome;
  }else DB.equipes.push({id:uid(),nome:nome});
  saveDB();closeModal();render();toast("Equipe salva","ok");
}
function saveOperacao(){
  var ref=(document.getElementById("ocRef").value||"").trim();
  var opNome=(document.getElementById("ocOpNome").value||"").trim();
  var tempo=pnum(document.getElementById("ocTempo").value);
  if(!ref||!opNome){toast("Informe referência e operação","err");return;}
  if(tempo<=0){toast("Informe o tempo padrão","err");return;}
  var reg={id:MODAL.editId||uid(),modeloRef:ref,modeloNome:(document.getElementById("ocModelo").value||"").trim(),
    operacaoId:(document.getElementById("ocOpId").value||"").trim(),operacaoNome:opNome,
    maquina:(document.getElementById("ocMaq").value||"").trim(),tempo:tempo};
  if(MODAL.editId){
    var ix=DB.operacoes.findIndex(function(x){return x.id===MODAL.editId;});
    if(ix>=0)DB.operacoes[ix]=reg;
  }else DB.operacoes.push(reg);
  saveDB();closeModal();render();toast("Operação salva","ok");
}

/* ════════════════════════════════════════════════════════════
   DROPDOWN ROLÁVEL DE MODELOS
   O <datalist> nativo do Chromium não rola de forma confiável com muitos
   itens (fica "estático"). Este dropdown customizado filtra e ROLA,
   reaproveitando o estilo .op-pick e o handler "change" de cada campo.
   ════════════════════════════════════════════════════════════ */
var DD_INPUT={modeloAtivoDD:"modeloAtivoInp",mModeloDD:"mModeloInp"};
/* sem corte: lista TODOS os modelos importados para conferência completa */
function modelosFiltrados(q){
  q=(q||"").toLowerCase().trim();
  var ms=modelosUnicos();
  return q?ms.filter(function(m){return (m.ref+" "+m.nome).toLowerCase().indexOf(q)>=0;}):ms;
}
/* posiciona o dropdown (position:fixed) logo abaixo do campo, com altura
   limitada ao espaço disponível na tela — garante a rolagem própria da lista. */
function posicionarDD(dd){
  var inp=document.getElementById(DD_INPUT[dd.id]);if(!inp)return;
  var r=inp.getBoundingClientRect();
  dd.style.left=r.left+"px";
  dd.style.top=(r.bottom+4)+"px";
  dd.style.width=r.width+"px";
  var espaco=window.innerHeight-r.bottom-14;
  dd.style.maxHeight=Math.max(160,Math.min(320,espaco))+"px";
}
function abrirModeloDD(ddId,q){
  var dd=document.getElementById(ddId);if(!dd)return;
  var total=modelosUnicos().length;
  var list=modelosFiltrados(q);
  var temFiltro=!!(q&&q.trim());
  /* cabeçalho fixo com a contagem — permite conferir se a importação está completa */
  var head='<div class="mdl-dd-head">📦 '+
    (temFiltro?(list.length+' de '+total+' modelo(s) encontrado(s)')
              :(total+' modelo(s) importado(s) — role para ver todos'))+'</div>';
  if(!list.length){
    dd.innerHTML=head+'<div class="empty" style="padding:14px;font-size:11px">Nenhum modelo encontrado</div>';
  }else{
    dd.innerHTML=head+list.map(function(m){
      return '<div class="op-pick" data-mdlref="'+esc(m.ref)+'" data-mdlnome="'+esc(m.nome)+'">'+
        '<span class="tag tag-slate">'+esc(m.ref)+'</span>'+
        '<span style="flex:1;min-width:0">'+esc(m.nome)+'</span></div>';
    }).join("");
  }
  dd.classList.add("open");
  posicionarDD(dd);
}
function fecharModeloDD(){
  var ds=document.querySelectorAll(".mdl-dd.open");
  for(var i=0;i<ds.length;i++)ds[i].classList.remove("open");
}
/* mantém o dropdown alinhado ao campo se a tela rolar/redimensionar */
function reposicionarDDAbertos(){
  var ds=document.querySelectorAll(".mdl-dd.open");
  for(var i=0;i<ds.length;i++)posicionarDD(ds[i]);
}
window.addEventListener("scroll",reposicionarDDAbertos,true);
window.addEventListener("resize",reposicionarDDAbertos);
/* abre ao focar (lista completa, rolável) */
document.addEventListener("focusin",function(e){
  var t=e.target;
  if(t&&t.id==="modeloAtivoInp"){if(t.select)t.select();abrirModeloDD("modeloAtivoDD","");}
  else if(t&&t.id==="mModeloInp"){abrirModeloDD("mModeloDD","");}
});
/* filtra conforme digita */
document.addEventListener("input",function(e){
  var t=e.target;
  if(t&&t.id==="modeloAtivoInp")abrirModeloDD("modeloAtivoDD",t.value);
  else if(t&&t.id==="mModeloInp")abrirModeloDD("mModeloDD",t.value);
});
/* seleção por clique + fechamento ao clicar fora */
document.addEventListener("click",function(e){
  var pick=e.target.closest&&e.target.closest("[data-mdlref]");
  if(pick){
    var ref=pick.getAttribute("data-mdlref"),nome=pick.getAttribute("data-mdlnome");
    var dd=pick.closest(".mdl-dd");
    var inpId=(dd&&dd.id==="mModeloDD")?"mModeloInp":"modeloAtivoInp";
    var inp=document.getElementById(inpId);
    if(inp){
      inp.value=ref+(nome&&nome!==ref?" · "+nome:"");
      fecharModeloDD();
      /* reaproveita o handler "change" já existente de cada campo */
      inp.dispatchEvent(new Event("change",{bubbles:true}));
    }
    return;
  }
  if(!(e.target.closest&&e.target.closest(".mdl-pick-wrap")))fecharModeloDD();
});
/* Esc fecha o dropdown */
document.addEventListener("keydown",function(e){if(e.key==="Escape")fecharModeloDD();});

/* ════════════════════════════════════════════════════════════
   INICIALIZAÇÃO
   ════════════════════════════════════════════════════════════ */
document.addEventListener("click",function(e){
  var t=e.target.closest("[data-act]");
  if(!t)return;
  var act=t.getAttribute("data-act");
  if(act==="bgClose"&&e.target!==t)return;
  handleAction(act,t.getAttribute("data-id"),t);
});
document.addEventListener("change",function(e){
  var t=e.target;
  /* render adiado: evita destruir o DOM no meio de um clique (o clique no
     botão era "engolido" quando o campo perdia o foco e a tela redesenhava) */
  var defer=function(){setTimeout(render,0);};
  if(t&&t.id==="modeloAtivoInp"){
    var mv=(t.value||"").trim();
    var mref=mv.indexOf(" · ")>=0?mv.split(" · ")[0].trim():mv;
    var ms=modelosUnicos();
    var mm=ms.find(function(x){return x.ref===mref;})||
           ms.find(function(x){return (x.ref+" · "+x.nome).toLowerCase()===mv.toLowerCase();})||
           ms.find(function(x){return x.nome.toLowerCase()===mv.toLowerCase();});
    UI.modeloAtivo=mm?mm.ref:"";defer();return;
  }
  if(t&&t.id==="semOcorChk"){
    var diaSO=diaAtual();
    if(diaSO&&diaSO.status==="finalizado"){defer();return;}
    if(diaSO){
      diaSO.semOcorrencias=!!t.checked;saveDB();defer();
      toast(diaSO.semOcorrencias?"Dia declarado sem ocorrências":"Declaração removida","ok");
    }
    return;
  }
  if(t.getAttribute&&t.getAttribute("data-act")==="selEquipe"){
    UI.equipeAtiva=t.value;
    defer();
  }else if(t.getAttribute&&t.getAttribute("data-act")==="selOperadora"){
    var opSel=operador(t.value);
    if(opSel){
      /* abre/cria o dia de HOJE para o operador selecionado (a produção lançada
         cai sempre na data atual; use o campo de data para ajustar se preciso) */
      var dataRef=todayISO();
      var diaExist=DB.dias.find(function(d){return d.operadorId===opSel.id&&d.data===dataRef;});
      if(diaExist){UI.dayId=diaExist.id;}
      else{var nd=novoDia(opSel.id,dataRef);UI.dayId=nd.id;}
      defer();
    }
  }else if(t.getAttribute&&t.getAttribute("data-act")==="editJornadaDia"){
    /* jornada editável por dia: vincula os lançamentos deste dia ao valor salvo */
    var dJ=diaAtual();
    if(dJ&&dJ.status!=="finalizado"){
      dJ.jornada=pnum(t.value)||0;saveDB();defer();
      toast("Jornada do dia atualizada para "+ni(dJ.jornada)+" min","ok");
    }
  }else if(t.getAttribute&&t.getAttribute("data-act")==="selData"){
    var d3=diaAtual();if(d3&&d3.status!=="finalizado"){d3.data=t.value;saveDB();defer();}else defer();
  }else if(t.getAttribute&&t.getAttribute("data-act")==="relTipo"){
    UI.relTipo=t.value;defer();
  }else if(t.getAttribute&&t.getAttribute("data-act")==="relModo"){
    UI.relModo=t.value;defer();
  }else if(t.getAttribute&&t.getAttribute("data-act")==="relDi"){
    UI.relDi=t.value;defer();
  }else if(t.getAttribute&&t.getAttribute("data-act")==="relDf"){
    UI.relDf=t.value;defer();
  }else if(t.getAttribute&&t.getAttribute("data-act")==="filtroEquipe"){
    UI.filtroEquipe=t.value;defer();
  }else if(t.id==="filtroOperEquipe"){
    UI.filtroOperEquipe=t.value;defer();
  }
});
document.addEventListener("input",function(e){
  if(e.target&&e.target.id==="buscaOper"){
    UI.buscaOper=e.target.value;
    /* filtro instantâneo sem rebuild completo */
    var busca=UI.buscaOper.toLowerCase();
    var filtEq=UI.filtroOperEquipe||"todas";
    var lista=DB.operadores.filter(function(o){
      var match=!busca||(o.nome+" "+(o.funcao||"")).toLowerCase().indexOf(busca)>=0;
      var matchEq=filtEq==="todas"||o.equipeId===filtEq;
      return match&&matchEq;
    });
    var tb=document.querySelector(".dt tbody");
    if(tb&&UI.screen==="operadores"){
      if(!lista.length){
        tb.innerHTML='<tr><td colspan="5"><div class="empty"><div class="big">👥</div>Nenhum operador encontrado.</div></td></tr>';
      }else{
        tb.innerHTML=lista.map(function(o){
          var nDias=DB.dias.filter(function(d){return d.operadorId===o.id&&d.status==="finalizado";}).length;
          var efMedia=nDias>0?(DB.dias.filter(function(d){return d.operadorId===o.id&&d.status==="finalizado";}).reduce(function(s,d){return s+calcDia(d).efic;},0)/nDias):0;
          var efStyle=nDias>0?'style="font-weight:800;color:'+corEfic(efMedia)+'"':'style="color:var(--ink3)"';
          var fx2=nDias>0?faixaDe(efMedia):{cor:"#94a3b8",rotulo:"—"};
          return '<tr>'+
            '<td><div style="display:flex;align-items:center;gap:10px">'+
              '<div style="width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0">'+esc(o.nome.charAt(0))+'</div>'+
              '<div><div style="font-weight:700;font-size:12.5px">'+esc(o.nome)+'</div>'+
              '<div style="font-size:10px;color:var(--ink3);font-weight:600">'+esc(o.funcao||"—")+'</div></div>'+
            '</div></td>'+
            '<td><span class="tag tag-slate">'+esc(equipeNome(o.equipeId))+'</span></td>'+
            '<td class="ctr"><span class="chip" style="background:var(--blue-l);color:var(--blue-d)">'+nDias+' dia(s)</span></td>'+
            '<td class="ctr" '+efStyle+'>'+(nDias>0?'<span style="background:'+fx2.cor+'18;color:'+fx2.cor+';padding:2px 8px;border-radius:20px;font-size:11px;font-weight:800">'+nf(efMedia)+'%</span>':"<span style='color:var(--ink3)'>—</span>")+'</td>'+
            '<td class="ctr"><div style="display:flex;gap:4px;justify-content:center">'+
            '<button class="icon-btn edit" data-act="editOper" data-id="'+o.id+'">✎</button>'+
            '<button class="icon-btn del" data-act="delOper" data-id="'+o.id+'">🗑</button></div></td></tr>';
        }).join("");
      }
    }
    return;
  }
  if(e.target&&e.target.id==="buscaOp"){
    UI.buscaOp=e.target.value;
    var tb=document.getElementById("opTbody");
    if(tb){
      var busca=UI.buscaOp.toLowerCase();
      var lista=DB.operacoes.filter(function(o){
        return !busca||(o.modeloRef+" "+o.modeloNome+" "+o.operacaoId+" "+o.operacaoNome).toLowerCase().indexOf(busca)>=0;
      }).slice(0,400);
      tb.innerHTML=lista.map(function(o){
        return '<tr><td><span class="tag tag-slate" style="font-family:monospace;font-size:11px">'+esc(o.modeloRef)+'</span></td><td>'+esc(o.modeloNome)+'</td>'+
          '<td class="ctr"><span class="tag tag-blue">'+esc(o.operacaoId)+'</span></td><td>'+esc(o.operacaoNome)+'</td>'+
          '<td><span style="font-size:11px;color:var(--ink3)">'+esc(o.maquina||"—")+'</span></td>'+
          '<td class="num"><b style="color:var(--navy)">'+nf(o.tempo,3)+'</b></td>'+
          '<td class="ctr"><div style="display:flex;gap:4px;justify-content:center">'+
          '<button class="icon-btn edit" data-act="editOperacao" data-id="'+o.id+'">✎</button>'+
          '<button class="icon-btn del" data-act="delOperacao" data-id="'+o.id+'">🗑</button></div></td></tr>';
      }).join("")||'<tr><td colspan="7"><div class="empty">Nenhuma operação encontrada.</div></td></tr>';
    }
  }
});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();});

(async function init(){
  await bootApp();
})();

/* Boot normal do app (após licença liberada). */
async function bootApp(){
  DB=await loadDBAsync();
  if(!DB||!DB.operadores||!DB.config){DB=seed();saveDB();}
  if(!DB.empresa)DB.empresa={nome:"Empresa",logo:""};
  if(!DB.dias)DB.dias=[];
  if(!DB.operacoes)DB.operacoes=[];
  if(!DB.equipes)DB.equipes=[];
  if(!DB.operadores)DB.operadores=[];
  if(DB.config.roteirosImportados==null)DB.config.roteirosImportados=false;
  if(DB.config.lancamentosAtivos==null)DB.config.lancamentosAtivos=true;
  if(!DB.config.tiposOcorrencia||!DB.config.tiposOcorrencia.length)DB.config.tiposOcorrencia=TIPOS_OCOR_PADRAO.slice();
  /* unificação meta↔faixas: o início da faixa "Dentro da meta" é o limite azul/vermelha.
     Reconcilia dados antigos que ficaram com meta e faixa divergentes. */
  if(DB.config.faixas&&DB.config.faixas.length){
    var _mf=metaDasFaixas();
    if(_mf!=null){DB.config.metaEficiencia=_mf;alinharFaixasComMeta(_mf);}
  }
  /* histórico de faixas: registra a configuração inicial se ainda não houver nenhum */
  if(!DB.config.faixasHistorico)DB.config.faixasHistorico=[];
  if(!DB.config.faixasHistorico.length)registrarHistoricoFaixa();
  /* migração: garante que todo dia tem as listas */
  DB.dias.forEach(function(d){
    if(!d.lancamentos)d.lancamentos=[];
    if(!d.ocorrencias)d.ocorrencias=[];
    if(d.jornada==null)d.jornada=DB.config.jornadaPadrao||528;
    if(d.semOcorrencias==null)d.semOcorrencias=false;
    /* congela meta/faixas nos dias antigos (baseline = configuração atual) */
    if(d.metaEficiencia==null)d.metaEficiencia=DB.config.metaEficiencia;
    if(!d.faixas||!d.faixas.length)d.faixas=snapCfg().faixas;
  });
  /* dias em rascunho acompanham a configuração atual (finalizados ficam congelados) */
  syncRascunhos();
  /* migração: reconecta dias cujo equipeId não existe mais (ex: após re-importação de operadores) */
  DB.dias.forEach(function(d){
    var eqOk=DB.equipes.some(function(e){return e.id===d.equipeId;});
    if(!eqOk){
      var op=DB.operadores.find(function(o){return o.nome.toLowerCase()===(d.operadorNome||"").toLowerCase();});
      if(op){d.operadorId=op.id;d.equipeId=op.equipeId;}
    }
  });
  UI.dayId=DB.dias.length?DB.dias[DB.dias.length-1].id:null;
  render();
}

</script>
